            "قِيَامَةِ لَا الْأُولَى وَبِالْحَالِ أُوِّلَا ... وَخَاطَبَ عَمَّا يُشْرِكُونَ هُنَا شَذَا",
            "وَفِي الرُّومِ وَالْحَرْفَيْنِ فِي النَّحْلِ أَوَّلَا ... يُسَيِّرُكُمْ قُلْ فِيهِ يَنْشُرُكُمْ كَفَى",
            "مَتَاعَ سِوَى حَفْصٍ بِرَفْعٍ تَحَمَّلَا ... وَإِسْكَانُ قِطَعاً دُونَ رَيْبٍ وُرُودُهُ",
            "وَفِي بَاءِ تَبْلُو التَّاءُ شَاعَ تَنَزُّلَا ... وَيَا لَا يَهْدِي اكْسِرْ صَفِيّاً وَهَاؤُهُ",
            "وَأَخْفَى بِنُوحٍ خُفِّفَ شَرْعُهُ وَلَا ... يَعْزُبُ كَسْرُ الضَّمِّ مَعْ سَبَإٍ رَسَا",
            "وَأَصْغَرَ فَارْفَعْهُ وَأَكْبَرَ فَيْصَلَا ... مَعَ الْمَدِّ قَطْعُ السِّحْرِ حُكْمٌ تَحَوَّلَا",
            "بِيَا وَقْفُ حَفْصٍ لَمْ يَصِحَّ فَيُحْمَلَا ... وَتَتَّبِعَانِ النُّونُ خَفَّ مَدًا وَمَا",
            "جَ بِالْفَتْحِ وَالْإِسْكَانِ قَبْلُ مُثَقَّلَا ... وَفِي أَنَّهُ كَسْرٌ شَفَا وَبِنُونِهِ",
            "وَيَجْعَلُ صِفْ وَالْخُلْفُ نُجْحُ رِضىً عَلَا ... وَذَاكَ هُوَ الثَّانِي وَنَفْسِيَ يَاؤُهَا",
            "وَرَبِّي مَعَ أَجْرِي وَإِنِّي وَلِي حُلَا ... وَإِنِّي لَكُمْ بِالْفَتْحِ حَقٌّ رُوَاتُهُ",
            "وَبَادِيَ بَعْدَ الدَّالِ بِالْهَمْزِ حُلِّلَا ... وَمِنْ كُلٍّ نَوِّنْ مَعْ قَدَ افْلَحَ عَالِماً",
            "فَعُمِّيَتِ اضْمُمْهُ وَثَقِّلْ شَذَا عَلَا ... وَفِي حَتْمٍ مَجْرَاهَا سِوَاهُمْ وَفَتْحُ يَا",
            "بُنَيَّ هُنَا نَصٌّ وَفِي الْكُلِّ عُوِّلَا ... وَآخِرَ لُقْمَانٍ يُوَالِيهِ أَحْمَدٌ",
            "وَسَكَّنَهُ زَاكٍ وَشَيْخُهُ الْأَوَّلَا ... وَفِي عَمَلٌ فَتْحٌ وَرَفْعٌ وَنَوِّنُوا",
            "وَغَيْرَ ارْفَعُوا إِلَّا الْكِسَائِيَّ ذَا الْمَلَا ... وَتَسْأَلَنِي خِفُّ الْكَهْفِ ظِلُّ حِمىً وَهَا",
            "هُنَا غُصْنُهُ وَافْتَحْ هُنَا نُونَهُ وَلَا ... وَيَوْمِئِذٍ مَعْ سَأَلَ فَافْتَحْ أَتَى رِضىً",
            "وَفِي النَّمْلِ حِصْنٌ قَبْلَهُ النُّونُ ثُقِّلَا ... ثَمُودَ مَعَ الْفُرْقَانِ وَالْعَنْكَبُوتِ لَمْ",
            "يُنَوَّنْ عَلَى فَصْلٍ وَفِي النَّجْمِ فُصِّلَا ... مَا لِثَمُودٍ نَوِّنُوا وَاخْفِضُوا رِضىً",
            "وَيَعْقُوبَ نَصْبُ الرَّفْعِ عَنْ فَاضِلٍ كَلَا ... هُنَا قَالَ سِلْمٌ كَسْرُهُ وَسُكُونُهُ",
            "وَقَصْرٌ وَفَوْقَ الطُّورِ شَاعَ تَنَزُّلَا ... وَفَاسْرِ أَنِ اسْرِ الْوَصْلُ أَصْلٌ دَنَا وَهَا",
            "هُنَا حَقُّ إِلَّا امْرَأَتَكَ ارْفَعْ وَأَبْدِلَا ... وَفِي سُعِدُوا فَاضْمُمْ صِحَاباً وَسَلْ بِهِ",
            "وَخِفٌّ وَإِنْ كُلًّا إِلَى صَفْوِهِ وِلَا ... وَفِيهَا وَفِي يس وَالطَّارِقِ الْعُلَا",
            "يُشَدِّدُ لَمَّا كَامِلٌ نَصَّ فَاعْتَلَا ... خِرَ النَّمْلِ عِلْماً وَالرُّومُ عَمَّ دَنَا حَلَا",
            "وَفِي زُخْرُفٍ فِي نَصِّ خُلْفٍ وَيَرْجِعُ الـ ... غَرِيبُ وَفِيهِ الضَّمُّ وَالْفَتْحُ إِذْ عَلَا",
            "وَخَاطَبَ عَمَّا يَعْمَلُونَ هُنَا وَوَا ... وَبَاءَاتُهَا عَنِّي وَإِنِّي ثَمَانِيَا",
            "وَضَيْفِي وَلَكِنِّي وَنُصْحِيَ فَاقْبَلَا ... شِقَاقِي وَتَوْفِيقِي وَرَهْطِيَ عُدَّهَا",
            "وَمَعْ فَطَرَنْ أَجْرِي مَعاً تُحْصِ مُكْمِلَا ... وَيَا أَبَتِ افْتَحْ حَيْثُ جَا لِابْنِ عَامِرٍ",
            "وَوُحِّدَ لِلْمَكِّي آيَاتُ الْوِلَا ... غَيَابَاتِ فِي الْحَرْفَيْنِ بِالْجَمْعِ نَافِعٌ",
            "وَتَأْمَنُنَا لِلْكُلِّ يُخْفَى مُفَصَّلَا ... وَأَدْغَمَ مَعْ إِشْمَامِهِ الْبَعْضُ عَنْهُمُ",
            "وَنَرْتَعْ وَنَلْعَبْ يَاءُ حِصْنٍ تَطَوَّلَا ... وَيَرْتَعْ سُكُونُ الْكَسْرِ فِي الْعَيْنِ ذُو حِمىً",
            "وَبُشْرَايَ حَذْفُ الْيَاءِ ثَبْتٌ وَمُيِّلَا ... شِفَاءٌ وَقَلِّلْ جِيدَهُ وَكِلَاهُمَا",
            "عَنِ ابْنِ الْعَلَا وَالْفَتْحُ عَنْهُ تَفَضَّلَا ... وَهَيْتَ بِكَسْرٍ أَصْلُ كُفْءٍ وَهَمْزُهُ",
            "لِسَانٌ وَضَمُّ التَّا لِوَا خُلْفِهِ حَلَا ... وَفِي كَافَ فَتْحُ اللَّامِ فِي مُخْلَصاً ثَوَى",
            "وَفِي الْمُخْلَصِينَ الْكُلِّ حِصْنٌ تَجَمَّلَا ... مَعاً حَاشَ حَاشَا حَجَّ دَأْباً لِحَفْصِهِمْ",
            "فَحَرِّكْ وَخَاطِبْ يَعْصِرُونَ شَذَا دَلَا ... وَنَكْتَلْ بِيَا شَافٍ وَحَيْثُ يَشَاءُ نُو",
            "نُ دَارٍ وَحِفْظاً حَافِظاً شَاعَ عُقَّلَا ... وَفِتْيَتِهِ فِتْيَانِهِ عَنْ شَذَا وَرُدْ",
            "بِالْإِخْبَارِ فِي قَالُوا أَئِنَّكَ دُغْفَلَا ... وَيَيْأَسُ مَعْ يَسْتَيْئَسُ اسْتَيْأَسُوا وَتَيْـ",
            "أَسُوا اقْلِبْ عَنِ الْبَزِّي بِخُلْفٍ وَأَبْدِلَا ... وَيُوحَى إِلَيْهِمْ كَسْرُ حَاءِ جَمِيعِهَا",
            "وَنُونٌ عُلَا يُوحَى إِلَيْهِ شَذَا عَلَا ... وَثَانِي نُنَجِّي احْذِفْ وَشَدِّدْ وَحَرِّكَنْ",
            "كَذَا نُجِّيَ اخْفِفْ كُذِّبُوا ثَابِتاً تَلَا ... وَأَنِّي وَإِنِّي الْخَمْسُ رَبِّي بِأَرْبَعٍ",
            "أَرَانِي مَعاً نَفْسِي لِيَحْزُنَنِي حُلَا ... وَفِي إِخْوَتِي حُزْنِي سَبِيلِيَ بِي وَلِي",
            "لَعَلِّيَ آبَائِي أَبِي فَاخْشَ مَوْحَلَا ... وَزَرْعٌ نَخِيلٌ غَيْرُ صِنْوَانٍ أُوِّلَا",
            "لَدَى خَفْضِهَا رَفْعٌ عَلَا حَقَّهُ طِلَا ... وَذَكِّرْ تُسْقَى عَاصِمٌ وَابْنِ عَامِرٍ",
            "وَقُلْ بَعْدَهُ بِالْيَا نُفَصِّلُ شُلْشُلَا ... وَمَا كُرِّرَ اسْتِفْهَامُهُ نَحْوُ أَئِذَا",
            "أَئِنَّا فَذُو اسْتِفْهَامٍ الْكُلُّ أَوَّلَا ... سِوَى نَافِعٍ فِي النَّمْلِ وَالشَّامِ مُخْبِرٌ",
            "سِوَى النَّازِعَاتِ مَعْ إِذَا وَقَعَتْ وِلَا ... وَدُونَ عِنَادٍ عَمَّ فِي الْعَنْكَبُوتِ مُخْـ",
            "بِراً وَهْوَ فِي الثَّانِي أَتَى رَاشِداً وِلَا ... سِوَى الْعَنْكَبُوتِ وَهْوَ فِي النَّمْلِ كُنْ رِضىً",
            "وَزَادَاهُ نُوناً إِنَّنَا عَنْهُمَا اعْتَلَا ... وَعَمَّ رِضىً فِي النَّازِعَاتِ وَهُمْ عَلَى",
            "أُصُولِهِمْ وَامْدُدْ لِوَاءً حَافِظاً بَلَا ... وَهَادٍ وَوَالٍ قِفْ وَوَاقٍ بِيَائِهِ",
            "وَبَاقٍ دَنَا هَلْ يَسْتَوِي صُحْبَةٌ تَلَا ... وَبَعْدُ صِحَابٌ يُوقِدُونَ وَضَمُّهُمْ",
            "وَصَدُّوا ثَوَى مَعْ صُدَّ فِي الطَّوْلِ وَانْجَلَى ... وَيُثْبِتُ فِي تَخْفِيفِهِ حَقٌّ نَاصِرٍ",
            "وَفِي الْكَافِرُ الْكُفَّارُ بِالْجَمْعِ ذُلِّلَا ... وَفِي الْخَفْضِ فِي اللَّهِ الَّذِي الرَّفْعُ عَمَّا",
            "خَالِقُ امْدُدْهُ وَالْبَارِئْ وَارْفَعِ الْقَافَ مُثِّلَا ... وَفِي النُّورِ وَاخْفِضْ كُلَّ فِيهَا وَالْأَرْضَ هَا",
            "هُنَا مُصْرِخِيَّ اكْسِرْ لِحَمْزَةَ مُجْمِلَا ... كَهَاءِ وَصْلٍ لِسَاكِنَيْنِ وَقُطْرُبٌ",
            "حَكَاهَا مَعَ الْفَرَّاءِ مَعْ وَلَدِ الْعَلَا ... وَهُمْ كِنَا حِصْنٍ يَضِلُّوا يَضِلَّ عَنْ",
            "وَأَفْئِدَةً بِالْيَا بِخُلْفٍ لَهُ وَلَا ... وَفِي لِتَزُولَ الْفَتْحُ وَارْفَعْهُ رَاشِدًا",
                        "وَرُبَّ خَفِيفٌ إِذْ نَمَا سُكْرَتْ دُنَا ... تَنَزَّلُ ضَمُ التَّالِشُعْبَةَ مُثْلَا",
            "وَبِالنُّونِ فِيهَا وَاكْسِرِ الزَّايَ وَانْصِبِالَ ... مَلَائِكَةُ الْمُرَفَوعَ عَنْ شَائِدِ عَلَى",
            "وَنُقِلَ لِلْمَكِي نُونُ تُبَشِّرُونَ ... وَاكْسِرُهُ حِرْمِيًّا وَمَا الْحَذْفُ أَوَلَا",
            "وَيَقْنَطُ مَعْهُ يَقْنَطُونَ وَتَقْنَطُوا ... وَهُنَّ بِكَسْرِ النُّونِ رَافَقْنَ حَمَّلًا",
            "وَمُنْخُوهُمْ خِفٌ وَفِي الْعَنكَبُوتِ نُنْ ... حِينَ شَفَا مُنْخُوكَ صُحْبَتُهُ وَلَا",
            "قَدَرْنَا بِهَا وَالنَّخْلِ صِفْ وَعِبَادِمَعُ ... بَنَاتِي وَأَنِّي ثُمَّ إِنِّي فَاعْقِلَا",
            "وَيُنْبِتُ نُونُ صَحَ يَدْعُونَ عَاصِمٌ ... وَفِي شُرَكَاءَ الْخُلْفُ فِي الْهُمَرْ هَلُهَلَا",
            "وَمِنْ قَبْلِ فِيهِمْ يَكْسِرُ النَّونَ نَافِعُ ... مَعَا يَتَوَفَّاهُمْ لِحَمْزَةَ وُصِلَا",
            "سَمَا كَامِلاً يَهْدِي بِضَمَ وَفَتْحَةٍ ... وَخَاطِبُ يَرَوْا شُرْعًا وَالْآخِرُ فِي كِلَا",
            "وَرَا مُفْرَطُونَ اكْسِرُ أَضَا يَتَفَيَّوا الـ ... مُؤَنَّثُ لِلْبَصْرِي قَبْلُ تُقبلا",
            "وَحَقُّ صِحَابِ ضَمُّ نَسْقِيكُمُ ومَعَا ... لِشُعْبَةَ خَاطِبٌ يَجْحَدُونَ مُعَلَّلًا",
            "وَظَعْنِكُمْ إِسْكَانُهُ ذَائِعُ وَيَجْـ ... ـزِينَ الَّذِينَ النُّونُ دَاعِيهِ نَوْلَا",
            "مَلَكْتَ وَعَنْهُ نَصَّ الأَخْفَشُ يَاءَهُ ... وَعَنْهُ رَوَى النَّقَاسُ نُونًا مُوَهَلَا",
            "سوى الشَّامِ خُمُوا وَاكْسِرُ وا فَتَنُوا لَهُمْ ... وَيُكْسَرُ فِي ضَيْقٍ مَعَ النَّمْلِ دُخْلُلا",
            "ووَيَتَّخِذُوا غَيْبُ خَلَا لِيَسُوا ... رَا وَ وَحَتُمُ الْهَمْزِ وَالْمَدُّ عُدِلَا",
            "وَيُلْقَاهُ يُضَمُّ مُشَدَّدًا ... كَفَى يَبْلُغَنَّ امْدُدْهُ وَاكْبَرْ ثَمَرُ دَ لَا",
            "وَعَنْ كُلِهِمْ شَدِدْ وَفَا أُقِ كُلِّهَا ... دَنَا كُفُوًا وَنَوْنَ عَلَى اعْتِلَا",
            "وبالفتح والتحريك مُصَوبٌ ... وَحَرَّكَهُ الْمَكِي وَمَدَ وَجَمَلَا",
            "وَخَاطَبَ فِي يُسْرِفْ شُهُودٌ وَضَمَّنَا ... بِحَفَيْهِ بِالْقُسْطَاسِ كَسْرُ شَدًّا عَلَا",
            "وَسَيِّئَةٌ فِي هَمْزِهِ اضْمُمْ وَهَائِهِ ... وَذَكِّرْ وَلَا تَنْوِينَ ذِكْرًا مُكَمَّلا",
            "وَخَفْفْ مَعَ الْفُرْقَانِ وَاضْهُمْ لِيَذْكُرُوا ... شِفَاءٌ وَفِي الْفُرْقَانِ يَذْكُرَ فُصِّلَا",
            "يَقُولُونَ عَن دَارٍ وَفِي الثَّانِ نَزْلَا ... شَفَا وَاكْسِرُوا إِسْكَانَ رَجْلِكَ عُمَلَا",
            "فَيُفْقَكُمْ وَاثْنَانِ يُرْسِلَ يُرْسِلَا ... وَفِي مَرْيَمَ بِالْعَكْسِ حَقٌّ شِفَاؤُهُ",
            "سَمَا كُفْلَهُ أَنتَ يُسَبِّحُ ... وَيَخْسِفَ حَقٌّ نُونُهُ وَيُعِيدَكُمْ",
            "سَمَا صِفْ نَأَى أَخْرَ مَعَا هَمْزَهُ مُلَا ... خِلَافَكَ فَافْتَحْ مَعْ سُكُونٍ وَقَصِّرِه",
            "تُفجر في الأولى كَتَقْتُلَ ثَابِتٌ ... وَعَمَّ نَدَى كِسْفًا بِتَحْرِيكِهِ وَلَا",
            "وَفِي سَب حَفْصُ مَعَ الشُّعَرَاءِ قُلْ ... وَفِي الرُّومِ سَكِنْ لَيْسَ بِالْخَلْفِ مُشْكِلا",
            "وَقُلْ قَالَ الأُولَى كَيْفَ دَارَ وَضُمَ تَا ... عَلَيْتَ رِضَى وَالْيَاءُ فِي رَبِّيَ انْجَلَى",
            "وَسَكَنَةُ حَفْصٍ دُونَ قَطِع لَطِيفَةٌ ... عَلَى أَلِفِ التَّنْوِينِ فِي عِوَجًا بَلَا",
            "وَفِي نُونِ مَنْ رَاقٍ وَمَرْ قَدِنَا وَلَا ... مِ بَلْ رَانَ وَالْبَاقُونَ لَا سَكْتَ مُوصَلا",
            "وَمِنْ لَدْنِهِ فِي الضَّمَ أَسْكِنْ مُشِمَّهُ ... وَمِنْ بَعْدِهِ كَسَرَانِ عَنْ شُعْبَةَ اعْتَلَى",
            "وَضُمَّ وَسَكِن ثُمَّ ضُمَّ لِغَيْرِهِ ... وَكُلُّهُمْ في الهَا عَلَى أَصْلِهِ تَلَا",
            "وَقُلْ مُرْفَقًا مَعَ الكَسْرِ عَمَّهُ ... وَتَزْوَزُ لِلشَّامِي كَتَحْمَرُ وُضِلَا",
            "وَتَزَاوَرُ التَّخْفِيفُ فِي الزَّايِ ثَابِتٌ ... وَحُرِمِيهُمْ مُلِنْتَ فِي اللَّامِ ثَقَلَا",
            "بِوَرْقِكُمُ الْإِسْكَانُ فِي صَفْو خُلُومٍ ... وَفِيهِ عَنِ الْبَاقِينَ كَسْرَ تَأَ صَلَا",
            "وَحَذْفُكَ لِلتَّنْوينِ مِن مِائَةٍ شَفَا ... وَتُشْرِكْ خِطَابٌ وَهُوَ بِالْجَزْمِ كُلا",
            "وَفِي تُرْ ضَمَيْهِ يَفْتَحُ عَاصِمٌ ... بِخَرفَيْهِ وَالإِسْكانُ فِي الْمِيمِ حَصِلَا",
            "وَدَعْ مِيمَ خَيْرًا مِنْهُمَا حُكْمُ ثَابِتٍ ... وَفِي الْوَصْلِ لَكِنَّا فَمُدَّ لَهُ مُلَا",
            "وَذَكِّرْ تَكُنْ شَافٍ وَفِي الْحَقِّ جَرُهُ ... عَلَى رَفْعِهِ خَيْرٌ سَعِيدٌ تَأَوَّلَا",
            "وَعُقْبَا سُكُونَ الظَّمَ نَصَ فَتَى وَيَا ... نُسَيِّرُ وَإِلَى فَتْحَهَا نَفَرُ مَلَا",
            "وَفِي النُّونِ أَنِتْ وَالجَبَالَ بِرَفْعِهِمْ ... وَيَوْمَ يَقُولُ النُّونَ حَمْزَةُ فَضَلَا",
            "لِمَهْلَكِهِمْ ضَمُوا وَمَهْلَكَ أَهْلِهِ ... سِوى عَاصِمٍ وَالْكَسْرُ فِي اللَّامِ عُوِلَا",
            "وَهَا كَسْرِ أَنْسَانِيهِ بِحَفْصِهِمْ ... وَمَعَهُ عَلَيْهِ اللَّهَ فِي الْفَتَح وَصَلَا",
            "وَقُلْ أَهْلَهَا بِالرَّفْعَ رَاوِيهِ فَصَلَا ... فتح الضَّمَ وَالكَسْرِ غَيْبَةً",
            "وَمُدَّ وَخَفِّفْ يَاءَ رَاكِيَةٌ سَمَا ... وَنُونَ لَدُنِّي خَفَّ صَاحِهُ إِلَى",
            "وَسَكِنْ وَأَشْهِمْ ضَمَةَ الدَّالِ صَادِقًا ... تَخِذْتَ فَخَفِّفْ وَاكْسِرِ الخَاءَ دُم حَلَى",
            "وَمِن بَعْدُ بِالتَّخْفِيفِ يُبْدِلَ هَهُنَا ... وَفَوْقَ وَتَحْتَ الْمُلْكِ كَافِيهِ ظُلَّلَا",
            "فَأَتْبَعَ خَفْفٌ فِي الثَّلاثَةِ ذَاكِرًا ... وَحَامِيَةِ بِالْمَدِّ صُحْبَتُهُ كَلَا",
            "وَفِي الْهُمَزِ يَاءُ عَنْهُمْ وَصِحَابَهُمْ ... جَزَاء فَنَونَ وَانْصِبِ الرَّفْعَ وَاقْبَلَا",
            "عَلَى حَقِّ السُّدَّيْنِ سُدًا صِحَابُ حَقَّ ... قِ الضَّمُّ مَفْتُوحُ وَيَاسِينَ شِدْ",
            "جُوجُ مَا جُوجَ اهْمِ الْكُلَّ نَاصِرًا ... وَفِي يَفْقَهُونَ الظَّمَ وَالْكَسْرُ حَقَهُ",
            "وَحَرَكَ بِهَا وَالْمُؤْمِنِينَ وَمُدَّهُ ... خَرَاجًا شَفَا وَاعْكِسُ فَخَرَجُ لَهُ مُلا",
            "وَمَكَتَنِي أَظْهِرُ لِيلًا وَسَكَنُوا ... مَعَ الظَّمَ وَالصُّدْفَيْنِ عَنْ شُعْبَةَ الْمَلَا",
            "ضَمَاهُ واهْمِنْ مُسَكِنَا ... لَدَى رَدْمًا ائْتُونِي وَقْبلُ الْسِيرِ الْوِلَا",
            "لِشُعْبَةَ وَالثَّانِي فَشَاصِفْ بِخَلْفِهِ ... وَلَا كَسَرَ وَابْدَا فِيهَمَا الْيَاءَ مُبْدِلَا",
            "وَزِدْ قَبْلُ هَمْزَ الْوَصْلِ وَالْغَيْرُ فِيهِمَا ... بِقَطْعِهِمَا وَالْمَدِّ بَدْءًا وَمَوْصِلَا",
            "وَطَاءَ فَمَا اسْطَاعُوا بِحَمْزَةَ شَدِدُوا ... وَأَنْ تَنْفَدَ النَّتَكِيرُ شَافٍ تَأَوَلَا",
            "ثَلَاثُ مَعَى دُونِي وَرَبِّي بِأَرْبَعٍ ... وَمَا قَبْلَ إِنْ شَاءَ الْمُضَافَاتُ تُخْتَلَى",
            "وَحَرْفَا يَرِثُ بِالْجَزْمِ حُلُورِضَى ... وَقُلْ خَلَقْتُ خَلَقْنَا شَاعَ وَجْهَا مُجَمَّلا",
            "كَسْرُهُ عَنْهُمَا وَقُلْ عِيًّا ... صِيًّا مَعْ جِثِيًّا شُدًا",
            "وَهَمْرُ أَهَبْ بِالْيَا جَرى بَحْ بِخُلْفٍ ... وَنِسَيًا فَتْحُهُ فَائِزُ عَلَى",
            "وَمَنْ تَحتُهَا اكْسِرُ وَاخْفِضِ الدَّهْرَ عَنْ شَذا ... وَخَفَّ تَسَاقَتْ فَاصِلا فَتْحُمِّلا",
            "وَفِي رَفْعِ قَوْلُ الْحَقِّ نَصْبُ ... وَكَسْرُ وَأَنَّ اللَّهَ ذَاكَ وَأَخْبَرُوا",
            "وبالضم والتخفيفِ وَالْكَسْرِ حَفْصُهُمْ ... بِخُلْفَ إِذَا مَا مُتُ مُوفِينَ وَصَلَا",
            "خَفِيفًا رُضُ مَقَامًا بِضَمِهِ ... دُنَا رِيَا ابْدِلْ مُدْعَا بَاسِطَا مُلَا",
            "بِهَا وَالزَّخْرُفِ اخْتُمْ وَسَكِنَنْ ... شِفَاءٌ وَفِي نُوحٍ شَفَا حَقَهُ وَلَا",
            "وَفِيهَا وَفِي الشورى يَكَادُ أَتَى رِضَا ... وَطَا يَتَفَطَّرْنَ اكْسِرُوا غَيْرَ أَثْقَلَا",
            "وَفِي التَّاءِ نُونُ سَاكِنُ حَجَ فِي صَفَا ... كَالٍ وَفِي الشَّورَى خَلَا صَفُوهُ وَلَا",
            "وَرَائِي وَاجْعَلْ لِي وَإِنِّي كِلَاهُمَا ... وَرَبِّي وَأَثَانِي مُضَافَاتِهَا الْعُلَى",
            "فَاضْهُمْ كَسْرَهَا أَهْلِهِ امْكُثُوا ... مَعًا وَافْتَحُوا إِنِّي أَنَا دَائِمًا حَلَى",
            "وَنُونَ بِهَا وَالنَّازِعَاتِ طُوًى ذَكَا ... وَفِي اخْتَرْتُكَ اخْتَرْنَاكَ فَازَ وَثَقَلَا",
            "وَأَنَّا وَشَامٍ قَطْعُ أَشْدُدْ وَضُمَ فِي ... ابْتِدَا غَيْرِهِ وَاضْتُمْ وَأَشْرِكَهُ كُلْكَلَا",
            "مع الزخْرُفِ اقْصُرْ بَعْدَ فَتح وَسَاكِن ... مِهَادًا تَوى وَاضْمُمْ سِوى فِي",
            "وَيَكْرُ بَاقِيهِمْ وَفِيهِ وَفِي سُدى ... عُمَالُ وُقُوفٍ فِي الْأُصُولِ تَأَصَّلَا",
            "فَيَسْحَتَكُمْ ضَمَّ وَكَسْرُ صِحَابُهُمْ ... وَتَخْفِيفُ قَالُوا إِنَّ عَالِمُهُ لَا",
            "وَهُدَيْنِ فِي هَذَانِ حَجَ وَثِقْلُهُ ... دَنَا فَاجْمَعُوا صِلَ وَافْتَحَ الْمِيمَ",
            "وَقُلْ سَاحِرٍ سِي شَفَا وَتَلَقَّفُ أَرْ ... فَعِ الْجَزْمَ مَعْ أُنثَى يُخَيَّلُ مُقْبِلا",
            "وَأَنْجَيْنَكُمْ وَاعَدْتُكُمْ مَا رَزَقْتُكُمْ ... شَفَا لَا تَخَفْ بِالْقَصْرِ وَالْجَزْمِ فُصِّلَا",
            "وَحَا فَيَحِلَّ الضَّمُّ فِي كَسْرِم رِضَا ... وَفِي لَامٍ يَحْلِلْ عَنْهُ وَإِلَى مُحَلَّلا",
            "وَفِي مِلْكِنَا صَمَّ شَفَا وَافْتَحُوا أُولِي ... نَهى وَحَمَلْنَا خُمَّ وَاكْسِرُ مُتَّقِلا",
            "كَا عِنْدَ وَخَاطَبَ يَصُرُوا ... شَئًا وَبِكَسْرِ اللَّامِ تُخْلِفَهُ حَلَا",
            "وَفِيضَهِ افْتَحْ عَنْ سِوى وَلَدِ الْعَلَا ... وَأَنَّكَ لَا فِي كَسْرِهِ صَفَوَةُ الْعُلَى",
            "وَبِالْقَصْرِ وَاجْزِمَ فَلَا يَخَفْ ... دَرَاكِ وَمَعْ يَاءٍ بِنَنْفُخُ ضَمُهُ",
            "وبالضم تَرْضَى صِفَ رِضَا يَأْتِهِمْ مُؤَن ... نَتْ عَنْ أُولِي حِفْظٍ لَعَلِّي أَخِي حَلَى",
            "وَذِكْرِي مَعَا إِنِّي مَعالي مَعَا حَشَرْ ... بَنِي عَيْنِ نَفْسِي الَّتِي رَأْسِيَ انْجَلَى",
            "وَقُلْ قَالَ عَنْ شَهْدٍ وَآخِرُهَا عَلا ... وَقُلْ أَوَلَمْ لَا وَاوَ دَارِيهِ وَصَلَا",
            "وَتُسْمِعُ فَتحُ الضَّمِّ وَالكَسْرِ غَيْبَةً ... سِوَى الْحَصَى وَالقُمَ بِالرَّفْعِ وَكِلَا",
            "وَقَالَ بِهِ فِي النَّخْلِ وَالرُّومِ دَارِمٌ ... وَمِثْقَالَ مَعْ لُقْمَانَ بِالرَّفْعِ أَكْمِلا",
            "جُدَادًا بِكَسْرِ الضَّمَ رَاوِ وَنُونُهُ ... لِيُحْصِنَكُمْ صَافَى وَأُنثَ عَنْ كِلَا",
            "وَسَكَنَ بَيْنَ الْكَسْرَ وَالْقَصْرِ صُحْبَةُ ... وَحِرْمُ وَتُنْجِي احْذِفْ وَثَقِلْ كَذِي صِلَا",
            "والكُتُبُ اجْمَعُ عَنْ شَداً وَمُضَافُهَا ... معى مَسَّنِي إِنِّي عِبَادِيَ مُجْتَلَا",
            "سكارى مَعَا سَكْرِي شَفَا ... وَمُحَرَّكُ لِيَقْطَعْ بِكَسْرِ اللَّامِ كَمْ جِيدُهُ حَلَا",
            "لِيُوفُوا ابْنُ ذَكْوَانٍ لِيَطَّوْفُوا لَهُ ... لِيَقْضُوا سِوى يمَ نَفَر",
            "وَمَعَ فَاطِرِ انْصِبُ لُؤْلُوْا نَظْمُ أُلْفَةٍ ... وَرَفَعَ سَوَاءٌ غَيْرُ حَفْصٍ تَنَخَّلَا",
            "وَغَيْرُ صَحَابِ فِي الشَّرِيعَةِ ثُمَّ وَلَ ... يُوفُوا فِيكُهُ لِشُعْبَةَ أَثْقَلَا",
            "مَعَامَنَسَكًا بِالْكَسْرِ فِي الدِّينِ سَلْشُلَا ... فَتَخْطَفُهُ عَنْ نَافِعٍ مِثْلُهُ وَقُلْ",
            "وَيَدْفَعُ حَقٌّ بَيْنَ فَتَحَيْهِ سَاكِنُ ... يُدَافِعُ وَالْغُمُومُ فِي أَذِنَ اعْتَلَى",
            "نَ عَمَّ عُلَاهُ هُدِّمَتْ خَفَّ إِذْ دَلَا ... نَعَمْ حَفِظُوا وَالْفَتْحُ فِي تَا يُقَاتِلُو",
            "تَعُدُّونَ فِيهِ الْغَيْبُ شَايَعَ دُخُلُلا ... وَبَصْرِيٌّ أَهْلَكْنَا بِنَاءٍ وَضَيْهَا",
            "مَن حَقٌّ بِلَامَةٍ وَفِي الْجِيمِ ثَقَلَا ... وَفِي سَبَا حَرْفَانِ مَعَهَا مُعَاجِزِي",
            "أَمَانَاتِهِمْ وَحِدٌ وَفِي سَالَ دَارِيًّا ... صَلَاتِهِمْ شَافٍ وَعَظَا كَذِي صِلَا",
            "مَعَ الْعَظمَ وَاهُم وَاكْسِيرِ الضَّمَّ حَقَّهُ ... بِتَنْبُتُ وَالْمَفْتُوحُ سِينَاءَ",
            "وَضَمْ تتم مُنزِلاً غَيْرُ شُعْبَةٍ ... وَنَوَّنَ تَتَرَاحَقُهُ وَاكْسِرِ الْوِلَا",
            "وَأَنَّ تَوى وَالنَّونَ خَفِفْ كَفَى وَتَهَا ... جُرُونَ بِضَيْمَ وَاكْسِرِ الظَّمَ أَعْلَا",
            "وَفِي لَامِ لِلَّهِ الْأَخِيرَيْنِ حَذْفَهَا ... وَفِي الْمَاءِ رَفَعُ الجَرْ عَنْ وَلَدِ الْعَلَا",
            "وَعَالِمُ خَفْضُ الرَّفْعِ عَنْ نَفَرٍ وَفَتْ ... حُ شِقُوَتُنَا وَامْدُدْ وَخَرَكُهُ سَلْتُلَا",
            "وَكَسْرُكَ سُخْرِيَّا بِهَا وَبِصَادِهَا ... عَلَى ضَمِهِ أَعْطَى شِفَاءٌ وَأَكْمَلا",
            "وَفِي أَنَّهُمْ كَسْرُ شَرِيفٌ وَتُرْجَعُونَ ... فِي الضَّمِّ فَتْحُ وَالْسِيرِ الْحِيمَ وَالْمُلَا",
            "وَفِي قَالَ كَمْ قُلْ دُونَ شَكٍّ وَبَعْدَهُ ... شَفَا وَبِهَا يَا الْعَلِي",
            "وَالأَوَّلُ مَعْ لَقُمَانَ يَدْعُونَ غَلَبُوا ... سِوى شُعَبَةٍ وَالْيَاءُ بَيْتِي جَمَلَا",
            "وَحَقُّ وَفَرَضْنَا ثَقِيلاً وَرَأْفَةٌ ... يُحَرِّكُهُ الْكِي وَأَرْبَعُ أَوْلَا",
            "صِحَابٌ وَغَيْرُ الْحَفْصِ خَامِسَةُ الْأَخِيرِ ... وَأَنْ غَضِبَ التَّخْفِيفُ وَالْكَسْرُ أُدْخِلَا",
            "وَيَرْفَعُ بَعْدُ الْجَرَ يَشْهَدُ شَائِعُ ... وَغَيْرِ أُولِي بِالنَّصْبِ صَاحِبُهُ كَلَا",
            "وَدرَى الْسِرَ جَةً رِضَا ... وَفِي مَدِهِ وَالْهُمَزِ صُحبَتُهُ حَلَا",
            "يُسَيِّحُ فتح الباكَذَا صِف وَيُوقَدُ الَ ... مُؤَنَتْ صِفْ شَرْعًا وَحَقُّ تَفَعَلَا",
            "وَمَا نَونَ الْبَرِّي سَحَابٌ وَرَفْعُهُمْ ... لَدَى ظُلُمَاتٌ جَرَّدَارٍ وَأَوْصَلَا",
            "كما اسْتَخْلَفَ اضْمُمُهُ مَعَ الْكَسْرِ صَادِقاً ... وَفِي يُبْدِلَنَّ الْخِفْ صَاحِبُهُ وَلَا",
            "وَثَانِي ثَلَاثَ ارْفَعْ سِوى صُحْبَةٍ وَقِفْ ... وَلَا وَقْفَ قَبْلَ النَّصْبِ إِنْ قُلْتَ أُبْدِلَا",
            "وَيَأْكُلُ مِنْهَا النُّونُ شَاعَ وَجَزْمُنَا ... وَيَجْعَلْ بِرَفْعَ كُلَّ صَافِيهِ كُمَّلا",
            "وَنَحْشُرُ يَا دَارٍ عَلَا فَيَقُولُ نُو ... نُ شَامٍ وَخَاطِبْ يَسْتَطِيعُونَ عُمَلَا",
            "وَنَزَلَ زِدْهُ النُّونَ وَارْفَعُ وَخِفَّ وَال ... مَلَائِكَةُ الْمَرَّفُوعُ يُنْصَبُ دُخْلُلا",
            "تَشَقَّقُ الدِّينِ مَنْ قَافَ غَالِبٌ ... وَيَأْمُرُ شَافٍ وَاجْمَعُوا ولا",
            "لَمْ يَقْتِرُوا مَّ وَالكَسْرِ ثَوْ يُضَاعَفْ ... وَيَخْلُدْ رَفْعُ جَزْمَ كَذِي صِلا",
            "وَوَجَدَ ذُرِّيَّاتِنَا حِفْظُ صُحْبَةٍ ... وَيَلْقَوْنَ فَاضْمُهُ، وَحَرِّكُ مُتَّقِلًا",
            "سوى صُحْبَةٍ وَالْيَاءُ قَوْمِي وَلَيْتَنِي ... وَكَمْ لَوْ وَلَيْتَ تُورِثُ الْقَلَبَأَنْصُلَا",
            "وَفِي حَذِرُونَ المَدْمَاثَلٌ فَارِهِي ... مَنَ ذَاعَ وَخَلْقُ اضْتُهُمْ وَحَرْكَ بِهِ الْعُلَى",
            "ك ما فِي نَدٍ وَالْأَيْكَةِ اللَّامُ سَاكِنُ ... مَعَ الْهَبْرِ وَاخْفِضُهُ وَفِصَادَ غَيْطَلَا",
            "وَفِي نَزَّلَ التخفيفُ وَالرُّوحَ وَالْأَمِينَ ... رَفْعُهُمَا غُلُو سَمَا وَتَبَجَّلَا",
            "وَأَنتُ يَكُنْ لِلْيَحْصَى وَارْفَعَ آيَةً ... وَفَا فَتَوَكَّلْ وَاوْ ظَانِهِ حَلَا",
            "وَيَا خَمْسِ أَجْرِى مَعْ عَبادِي وَلِي مَعِي ... مَعَامَعُ أَبِي إِنِّي مَعَا رَبِّيَ الْخَلَى",
            "شِهَابٍ بِنُونٍ ثَقُ وَقُلْ يَأْتِيَنَّنِي ... دَنَا مَكَثَ افْتَحَ ضَمَّةَ الْكَافِ نَوْفَلَا",
            "مَعَا سَبَا افْتَحَ دُونَ نُونٍ حَيَّ هُدًى ... وَسَكِنَهُ وَانُو الْوَقْفَ زُهْرًا وَمَنْدَلَا",
            "أَلَا يَسْجُدُوا رَاءٍ وقِفْ مُبْتَلَى أَلَا ... وَيَا وَاسْجُدُوا وَابْبَدَأَهُ بِالطَّمِ مُوصِلًا",
            "أَرَادَ أَلَا يَا هَؤُلَاءِ اسْجُدُوا وَقِفٌ ... لَهُ قَبْلَهُ وَالْغَيْرُ أَدْرَجَ مُبْدِلًا",
            "وَقَدْ قِيلَ مَفْعُولًا وَأَنْ أَدْغَمُوا بِلَا ... وَلَيْسَ بِمَقْطُوعٍ فَقِفٌ يَسْجُدُوا وَلَا",
            "وَيُخْفُونَ خَاطِبُ يُعْلِنُونَ عَلَى رِضَى ... تُمُدُّونَنِي الْإِدْغَامُ فَازَ فَتَقَلَا",
            "مع السُّوقِ سَاقَيْهَا وَسُوقِ اهْرُوا زَكَا ... وَوَجْهُ بِهَمْزِ بَعْدَهُ الْوَاوُ وُكِلَا",
            "نَقُولَنَّ فَاضْهُمْ رَابِعًا وَنُبَيِّتَ ... نَهُ وَمَعَا فِي النُّونِ خَاطِبُ شَمَرُ دَلَا",
            "وَمَعْ فَتح إِنَّ النَّاسَ مَا بَقَد مَكْرِهِمْ ... لِكُوفٍ وَأَمَّا يُشْرِكُونَ تَدْ حَلَا",
            "وَشَدَدْ وَصِلٌ وَامْدُدْ بَلِ ادَّارَكَ الَّذِي ... كا قَبْلَهُ يَذَّكَّرُونَ لَهُ حَلَى",
            "بِهَادِي مَعَا تَهْدِي فَتَا الْعُمْيِ نَاصِبَا ... وَبِالْيَا لِكُلِّ قِفْ وَفِي الرُومِ",
            "وآتُوهُ فَاقْصُرُ وَافتح الظَّمَ عِلْمُهُ ... فَتَا تَفْعَلُونَ الْغَيْبُ حَقٌّ",
            "وَمَا لِي وَأَوْزِعْنِي وَإِنِّي كِلَاهُمَا ... لِيَبْلُوَنِي الْيَاءَاتُ فِي قَوْلِ مَنْ بَلَا",
            "وَفِي نَرِيَ الفَتَحَانِ مَعُ أَلِفٍ وَيَا ... بِهِ وَثَلاثَ رَفْعُهَا بَعْدُ شُكِلَا",
            "وحزنا بهم من سكون شُفَا وَيَصْ ... مُرَاهُمُ وَكَسْرُ الظَّمَ ظَامِيهِ أَنْهَالًا",
            "وَحِذْوَةِ اضْتُمْ فُرْتَ وَالْفَحْ وَصَى كَهْفُ ... الرَّهْبِ وَاسْكِنَهُ ذُبَّلا",
            "يُصَدِّقْنِي ارْفَعْ جَزْمَهُ فِي نُصُوصِهِ ... وَقُلْ قَالَ مُوسَى وَاحْذِفِ الْوَاوَ دُخْلُلا",
            "نَمَا نَفَرَ بِالضَّمِ وَالْفَتْحِ يَرْجِعُونَ ... سِحْرَانِ فِي سَاحِرَانِ فَتُقْبَلَا",
            "وَيُجْبَى خَلِيطٌ يَعْقِلُونَ حَفِظْتُهُ ... وَفِي خُسِفَ الْفَحْيْنِ حَفْصُ تَتَخَلَا",
            "وَعِنْدِي وَذُو الدُّنْيَا وَإِنِّي أَرْبَعُ ... لَعَلِي مَعَارَتِي ثَلاثُ مَعَى اعْتَلَى",
             "وَعِنْدِي وَذُو الدُّنْيَا وَإِنِّي أَرْبَعُ ... لَعَلِّي مَعَارَبِّي ثَلاثُ",  
        ];

        // ฟังก์ชันลบสระภาษาอาหรับ (Harakat) เพื่อให้ค้นหาง่ายขึ้น
        function normalizeArabic(text) {
            return text
                .replace(/[\u0617-\u061A\u064B-\u0652\u0670]/g, "") 
                .replace(/[أإآ]/g, "ا") 
                .replace(/ة/g, "ه"); 
        }

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        // ทำงานทันทีเมื่อมีการพิมพ์ (Real-time search)
        searchInput.addEventListener('input', function() {
            const query = normalizeArabic(this.value.trim());
            resultsDiv.innerHTML = ''; 

            if (query === '') {
                resultsDiv.innerHTML = '<div class="empty-state">ابحث عن أي كلمة لظهور الأبيات...</div>';
                return;
            }

            const filteredVerses = shatibiyyahVerses.map((verse, index) => {
                return { 
                    original: verse, 
                    index: index + 1, 
                    normalized: normalizeArabic(verse) 
                };
            }).filter(item => item.normalized.includes(query));

            if (filteredVerses.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة... (ไม่พบคำที่ค้นหา)</div>';
            } else {
                filteredVerses.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `${item.original} <span class="verse-number">[بيت: ${item.index}]</span>`;
                    resultsDiv.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
