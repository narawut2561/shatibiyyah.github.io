    <script>
        // ฐานข้อมูลบทกวี (ปัจจุบันมี 400 บท)
        const shatibiyyahVerses = [
            "بَدَأْتُ بِبِسْمِ اللَّهِ فِي النَّظْمِ أَوَّلَا ... تَبَارَكَ رَحْمَانًا رَحِيمًا وَمَوْثِلًا",
            "وَثَنَّيْتُ صَلَّى اللهُ رَبِّي عَلَى الرِّضَا ... مُحَمَّدٍ الْمُهْدَى إِلَى النَّاسِ مُرْسَلًا",
            "وَعِتْرَتِهِ ثُمَّ الصَّحَابَةِ ثُمَّ مَنْ ... تَلَاهُمْ عَلَى الْإِحْسَانِ بِالْخَيْرِ وَبَلَا",
            "وَثَلَّثْتُ أَنَّ الْحَمْدَ لِلَّهِ دَائِمًا ... وَمَا لَيْسَ مَبْدُوا بِهِ أَجْدَمُ الْعَلَا",
            "وَبَعْدُ فَحَبْلُ اللهِ فِينَا كِتَابُهُ ... فَجَاهِدْ بِهِ حِبْلَ الْعِدَا مُتَحَبِلَا",
            "وَأَخْلِقْ بِهِ إِذْ لَيْسَ يَخْلُقُ جِنَّةً ... جَدِيدًا مُوَالِيهِ عَلَى الْجِدِ مُقْبِلَا",
            "وَقَارِثُهُ الْمَرْضِيُّ قَرَّ مِثَالُهُ ... كَالا تْرُجٌ حَالَيْهِ مُرِيحًا وَمُوكِلا",
            "هُوَ الْمُرْتَضَى أَمَّا إِذَا كَانَ أُمَّةً ... وَيَيْمَهُ ظِلُّ الرَّزَانَةِ قَنْقَلَا",
            "هُوَ الْحُرُّ إِنْ كَانَ الْحَرِى حَوَارِيَا ... لَهُ بِتَحَرِّيهِ إِلَى أَنْ تَنَبَّلَا",
            "وَإِنَّ كِتَابَ اللهِ أَوْثَقُ شَافِعَ ... وَأَغْنَى غَنَاءٍ وَاهِبَا مُتَفَضِلًا",
            "وَخَيْرٌ جَلِيسٍ لَا يُمَلُّ حَدِيثُهُ ... وَتَرْدَادُهُ يَزْدَادُ فِيهِ تَحَمُلا",
            "وَحَيْثُ الْفَتَى يَرْتَاعُ فِي ظُلُمَاتِهِ ... مِنَ الْقَبْرِ يَلْقَاهُ سَنَا مُتَهَلِّلا",
            "هُنَالِكَ يَهْنِيهِ مَقِيلًا وَرَوْضَةً ... وَمِنْ أَجْلِهِ فِي ذِرْوَةِ الْعِزْيُجْتَلى",
            "يُنَاشِدُ إِرْضَائِهِ فِي لِحَبِيبِهِ ... وَأَجْدِرْبِهِ سُولًا إِلَيْهِ مُوَصَّلَا",
            "فَيَا أَيُّهَا الْقَارِى بِهِ مُتَمَسِّكاً ... مُحِلًّا لَهُ فِي كُلِّ حَالٍ مُجَلا",
            "هَنِيئًا مَرِيئًا وَالِدَاكَ عَلَيْهِمَا ... مَلَا بِسُ أَنْوَارٍ مِنَ التَّاجِ وَالْحُلَى",
            "فَمَا ظَنَّكُمْ بِالنَّخْلِ عِنْدَ جَزَائِهِ ... أُولَئِكَ أَهْلُ اللَّهِ وَالصَّفْوَةُ الْمَلَا",
            "أُولُو الْبِرِّ وَالْإِحْسَانِ وَالصَّبْرِ وَالتَّقَى ... حُلَاهُمْ بِهَا جَاءَ الْقُرَانُ مُفَصَّلا",
            "عَلَيْكَ بِهَا مَا عِشْتَ فِيهَا مُنَافِسًا ... وَبِعْ نَفْسَكَ الدُّنْيَا بِأَنْفَاسِهَا الْعُلَى",
            "جَزَى اللَّهُ بِالْخَيْرَاتِ عَنَّا أَئِمَةً ... لَنَا نَقَلُوا الْقُرْآنَ عَذَبًا وَسَلْسَلَا",
            "فَمِنْهُمْ بُدُورٌ سَبْعَةٌ قَدْ تَوَسَطَتْ ... سَمَاءَ الْعُلَى وَالْعَدْلِ زُهْرًا وَكُمَلا",
            "لَهَا شُهُبٌ عَنْهَا اسْتَنَارَتْ فَنَوَّرَتْ ... سَوَادَ الدُّجى حَتَّى تَفَرَّقَ وَانْجَلَى",
            "وَسَوْفَ تَرَاهُمْ وَاحِدًا بَعْدَ وَاحِدٍ ... مَعَ اثْنَيْنِ مِنْ أَصْحَابِهِ مُتَمَتِّلَا",
            "تَخَيَّرَهُمْ نُقَادُهُمْ كُلَّ بَارِعٍ ... وَلَيْسَ عَلَى قُرَأْنِهِ مُتَأَكِلَا",
            "فَأَمَّا الكَرِيمُ السِّرِّ في الطيبِ نَافِعُ ... فَذَاكَ الَّذِي اخْتَارَ الْمَدِينَةَ مَنْزِلَا",
            "وَقَالُونَ عِيسَى ثُمَّ عُثْمَانُ وَرْشُهُمْ ... بِصُحْبَتِهِ الْجَدَ الرَّفِيعَ تَأَثَّلَا",
            "وَمَكَةُ عَبْدُ اللهِ فِيهَا مُقَامُهُ ... هُوَ ابْنُ كَثِيرِ كَاثِرُ الْقَوْمِ مُعْتَلَى",
            "رَوَى أَحْمَدُ الْبَزّى لَهُ وَمُحَمَّدٌ ... عَلَى سَنَدٍ وَهُوَ الْمُلَقَّبُ قُبْلَا",
            "وَأَمَّا الْإِمَامُ الْمَازِنِي صَرِيحُهُمْ ... أَبُو عَمْرٍ وَالْبَصَرِى فَوَالِدُهُ الْعَلَا",
            "أَفَاضَ عَلَى يَحْيَى الْيَزِيدِي سَيْبَهُ ... فَأَصْبَحَ بِالْعَدْبِ الْفُرَاتِ مُعَلَّلًا",
            "أَبُو عُمَرَ الدُّورِي وَصَالِحُهُمْ أَبُو ... شُعَيْبٍ هُوَ السُّوسِيُّ عَنْهُ تَقَبَّلَا",
            "وَأَمَّا دِمَشْقُ الشَّامِ دَارُ ابْنِ عَامِرٍ ... فَتِلْكَ بِعَبْدِ اللَّهِ طَابَتْ مُحَلَّلَا",
            "هِشَامٌ وَعَبْدُ اللَّهِ وَهُوَ انْتِسَابُهُ ... لِذِكْوَانَ بِالْإِسْنَادِ عَنْهُ تَنَقَّلَا",
            "وَبِالْكُوفَةِ الْغَرَّاءِ مِنْهُمْ ثَلَاثَةٌ ... أَذَاعُوا فَقَدْ ضَاعَتْ شَدًا وَقَرَنْفُلَا",
            "فَأَمَّا أَبُو بَكْرٍ وَعَاصِمَ اسْمُهُ ... فَشُعْبَةُ رَاوِيهِ الْمُبَرِّزُ أَفْضَلَا",
            "وَذَاكَ ابْنُ عَيَّاشٍ أَبُو بَكْرِ الرِّضَا ... وَحَفْصُ وَبِالْإِثْقَانِ كَانَ مُفَضَّلًا",
            "وَحَمْزَةٌ مَا أَزْكَاهُ مِنْ مُتَوَرِّع ... إِمَا مَا صَبُورًا لِلْقُرَانِ مُرَتِّلَا",
            "روى خَلَفٌ عَنْهُ وَخَلَّادُ الَّذِي ... رَوَاهُ سُلَيْمٌ مُتْقَنَا وَمُحَصَلَا",
            "وَأَمَّا عَلِيٌّ فَالْكِسَائِي نَعْتُهُ ... لِمَا كَانَ فِي الْإِحْرَامِ فِيهِ تَسَرْبَلَا",
            "رَوَى لَيْتُهُمْ عَنْهُ أَبُو الْحَارِثِ الرِّضا ... وَحَفْصُ هُوَ الدُّورِي وَفِي الذِّكْرِ قَدْ خَلَا",
            "أَبُو عَمْرِهِمْ وَالْيَحْصَى ابْنُ عَامِرٍ ... صَرِيحٌ وَبَاقِيهِمْ أَحَاطَ بِهِ الْوَلَا",
            "لَهُمْ طُرُق يُهْدَى بِهَا كُلُّ طَارِقٍ ... وَلَا طَارِقُ يُخْشَى بِهَا مُتَمَحِلَا",
            "وَهُنَّ اللَّوَاتِي لِلْمُوَاتِي نَصَبتها ... مَنَاصِبَ فَانْصَبْ فِي نِصَابِكَ مُفْضِلًا",
            "وَهَا أَنَا ذَا أَسْعَى لَعَلَّ حُرُوفَهُمْ ... يَطُوعُ بِهَا نَظْمُ الْقَوَا فِي مُسَهَّلَا",
            "جَعَلْتُ أَبَا جَادٍ عَلَى كُلِّ قَارِي ... دَلِيلًا عَلَى الْمَنْظُومِ أَوَّلَ أَوَّلَا",
            "وَمِنْ بَعْدِ ذِكْرِي الْحَرْفَ أُسْمِي رَجَالَهُ ... متى تَنْقَضى آتِيكَ بِالْوَاوِ فَيُصَلَا",
            "سِوَى أَحْرُفٍ لَا رِيبَةُ فِي اتِّصَالِهَا ... وَبِاللَّفْظِ أَسْتَغْنِي عَنِ الْقَيْدِ إِنْ جَلَا",
            "وَرُبَّ مَكَانٍ كَزَرَ الْحَرْفَ قَبْلَهَا ... لِمَا عَارِضٍ وَالْأَمْرُ لَيْسَ مُهَوِلَا",
            "وَمِنْهُنَّ لِلْكُوفِي ثَاءُ مُثَلَّتْ ... وَسِنَتُهُمْ بِالْخَاءِ لَيْسَ بِأَغْفَلَا",
            "عَنَيْتُ الأولى أَثْبَهُمْ بَعْدَ نَافِعٍ ... وَكُوفٍ وَشَامٍ ذَالُهُمْ لَيْسَ مُغْفَلَا",
                        "وَكُوفٍ مَعَ الْمَكِي بِالظَّاءِ مُعْجَمًا ... وَكُوفٍ وَبَصْرِ غَيْنُهُمْ لَيْسَ مُهْمَلَا",
            "وَذُو النَّقْطِ شِينُ لِلْكِسَائِي وَحَمْزَةٍ ... وَقُلْ فِيهِمَا مَعْ شُعْبَةٍ صُحْبَةٌ تَلَا",
            "صِحَابُ هُمَا مَعْ حَفْصِهِمْ عَمَّ نَافِعُ ... وَشَامٍ سَمَا فِي نَافِعِ وَفَتَى العَلَا",
            "وَمَنْ وَحَقُّ فِيهِ وَابْنِ الْعَلَاءِ قُلْ ... وَقُلْ فِيهِمَا وَالْيَحْصَبِي نَفَرُ حَلَا",
            "وَخَرِّيُّ الْمَكِي فِيهِ وَنَافِعُ ... وَحِصْنُ عَنِ الْكُوفِي وَنَافِعِهِمْ عَلَا",
            "وَمَهُمَا أَتَتْ مِنْ قَبْلُ أَوْ بَعْدُ كِلْمَةٌ ... فَكُنْ عِنْدَ شَرْطَى وَاقْضِ بِالْوَاوِ فَيُصَلَا",
            "وَمَا كَانَ ذَا ضِدٌ فَإِنِّي بِضِدِّهِ ... غَنِيٌّ فَزَاحِمٌ بِالذَّكَاءِ لِتَفْضُلَا",
            "كَمَدٍ وإِثْبَاتٍ وَفَتْحِ وَمُنْغَم ... وَهَمْرٍ وَنَقْلِ وَاخْتِلَاسٍ تَحَصَّلَا",
            "وَجَزْمٍ وَتَذْكِيرِ وَغَيْبِ وَخِفَّةٍ ... وَجَمْعَ وَتَنْوينِ وَتَحْرِيكِ أَعْمِلا",
            "وَحَيْثُ جَرَى التَّحْرِيكُ غَيْرَ مُقَيَّدٍ ... هُوَ الْفَتْحُ وَالْإِسْكَانُ آخَاهُ مَنْزِلَا",
            "وأَخَيْتُ بَيْنَ النُّونِ وَالْيَا وَفَتْحِهِمْ ... وَكَسْرِ وَبَيْنَ النَّصْبِ وَالْخَفْضِ مُنْزِلَا",
            "وَحَيْثُ أَقُولُ الضَّمُّ والرَّفْعُ سَاكِنَا ... فَغَيْرُهُم بِالفَتْحِ وَالنَّضَبِ أَقْبَلَا",
            "وَفِي الرَّفْعِ وَالتَّذْكِيرِ وَالْغَيْبِ جُمْلَةٌ ... عَلَى لَفْظِهَا أَطْلَقْتُ مَنْ قَيَّدَ الْعُلَى",
            "وَقَبْلَ وَبَعْدَ الْحَرْفِ آتِي بِكُلِّ مَا ... رَمَرْتُ بِهِ فِي الْجَمَعِ إِذْ لَيْسَ مُشْكِلا",
            "وَسَوْفَ أُسَمّى حَيْثُ يَسْمَحُ نَظْمُهُ ... بِهِ مُوضِحًا جِيدًا مُعَمَّا وَمُخْوَلا",
            "وَمَنْ كَانَ ذَا بَابٍ لَهُ فِيهِ مَذْهَبْ ... فَلَا بُدَّ أَنْ يُسْمَى فَيُدْرَى وَيُعْقَلَا",
            "أَهَلَّتْ فَلَبَّهَا الْمَعَانِي لُبَابُهَا ... وَصُعْتُ بِهَا مَا سَاغَ عَذَبًا مُسَلِّسَلَا",
            "وَفِي يُسْرِهَا التَّيْسِيرُ رُمْتُ اخْتِصَارَهُ ... فَأَجْنَتْ بِعَوْنِ اللَّهِ مِنْهُ مُؤَمَّلَا",
            "وَأَلْفَافُهَا زَادَتْ بِنَشْرِ فَوَائِدٍ ... فَلَفَّتْ حَيَاءً وَجْهَهَا أَنْ تُفَضَلَا",
            "وَسَمَيْتُهَا حِرْزَ الْأَمَانِي تَيَمنَا ... وَوَجْهَ النَّهَ100แรกِي فَاهْنِهِ مُتَقَبِلَا",
            "وَنَادَيْتُ اللَّهُم يَا خَيْرَ سَامِع ... أَعِذْنِي مِنَ التَّسْمِيعِ قَوْلًا وَمَفْعَلَا",
            "إِلَيْكَ يَدِي مِنْكَ الأَيَادِي تَمُتُهَا ... أَجِرْنِي فَلَا أَجْرِى بِجَوْرٍ فَأَخْطَلَا",
            "أَمِينَ وَأَمَّنَا لِلْأَمِينِ بِسِرهَا ... وَإِنْ عَثَرَتْ فَهُوَ الْأَمُونُ تَحْلا",
            "أَقُولُ لِحُرِّ وَالْمُرُوءَةُ مَرْؤُهَا ... لِإِخْوَتِهِ الْمَرْآةُ ذُو النُّورِ مِكْحَلَا",
            "أَخِي أَيُّهَا الْمُجْتَازُ نَظَهِي بِبَابِهِ ... يُنَادَى عَلَيْهِ كَاسِدَ السُّوقِ أَجْمِلا",
            "وَظُنَّ بِهِ خَيْرًا وَسَامِحُ نَسَيجَهُ ... بِالإِغْضَاءِ وَالْحُسْنَى وَإِنْ كَانَ هَلْهَلَا",
            "وَسَلَّمَ الإِحْدَى الْحُسْنَيَيْنِ إِصَابَةُ ... وَالْأُخْرَى اجْتَهَادُ رَامَ صَوْبًا فَأَمْحَلَا",
            "وَإِنْ كَانَ خَرْقُ فَادْرِكْهُ بِفَضْلَةٍ ... مِنْ الْحِلْمِ وَلْيُصْلِحُهُ مَنْ جَادَ مِقْوَلَا",
            "وَقُلْ صَادِقًا لَوْلَا الْوِثَامُ وَرُوحُهُ ... لَطَاحَ الْأَنَامُ الْكُلُّ فِي الْخُلْفِ وَالْقِلَى",
            "وَعِشْ سَالِماً صَدْرًا وَعَنْ غِيبَةٍ فَعِبٌ ... مُحَضَرُ حِظَارَ القُدُسِ أَنْقَى مُغَسَّلَا",
            "وَهَذَا زَمَانُ الصَّبْرِ مَنْ لَكَ بِالَّتِي ... كَقَبْضٍ عَلَى جَمْرِ فَتَنْجُو مِنَ البَلَا",
            "وَلَوْ أَنَّ عَيْنًا سَاعَدَتْ لَتَوَكَّفَتْ ... سَحَائِبُهَا بِالدَّمْعِ دِيمًا وَهُظَلَا",
            "وَلَكِنَّهَا عَنْ قَسْوَةِ الْقَلْبِ قَحْطُهَا ... فَيَا ضَيْعَةَ الْأَعْمَارِ تَمْشِي سَبَهْلَلَا",
            "بِنَفْسِي مَنِ اسْتَهْدَى إِلى اللهِ وَحْدَهُ ... وَكَانَ لَهُ الْقُرْآنُ شِرْبًا وَمَغْسِلَا",
            "وَطَابَتْ عَلَيْهِ أَرْضُهُ فَتَفَتَّقَتْ ... بِكُلِّ عَبِيرِ حِينَ أَصْبَحَ مُخْضَلَا",
            "فَطُوبَى لَهُ وَالشَّوْق يَبْعَثُ هَمَّهُ ... وَزَنْدُ الْأَسَى يَهْتَاجُ فِي الْقَلْبِ مُشْعِلا",
            "هُوَ الْجُتَبِي يَعْدُو عَلَى النَّاسِ كُلِّهِمْ ... قَرِيبًا غَرِيبًا مُسْتَمَالاً مُؤَمِّلا",
            "يَعُدُّ جَمِيعَ النَّاسِ مَوْلَى لِأَنَّهُمْ ... عَلَى مَا قَضَاهُ اللَّهُ يُجْرُونَ أَفْعُلا",
            "يَرَى نَفْسَهُ بِالذَّمِّ أَوْلَى لِأَنَّهَا ... عَلَى الْجَدِ تَلْعَقِّ لَمْ مِنَ الصَّبْرِ وَالأَلَا",
            "وَقَدْ قِيلَ كُنَّ كَالْكَلْبِ يُقْصِيهِ أَهْلُهُ ... وَمَا يَأْتَلِي فِي نُصْحِهِمْ مُتَبَدِّلَا",
            "لَعَلَّ إِلَهَ الْعَرْشِ يَا إِخْوَتِي يَقِي ... جَمَاعَتَنَا كُلَّ المَكَارِهِ هُوَلَا",
            "وَيَجْعَلُنَا مِمَّنْ يَكُونُ كِتَابُهُ ... شَفِيعًا لَهُمْ إِذْ مَا نَسُوهُ فَيَمْحَلَا",
            "وَبِاللَّهِ حَولِي وَاعْتِصَامِي وَقُوَّتِي ... وَمَالِيَ إِلَّا سِتْرُهُ مُتَجَلَّلا",
            "فَيَا رَبِّ أَنْتَ اللهُ حَسْبِي وَعَدَتِي ... عَلَيْكَ اعْتِمَادِي ضَارِعًا مُتَوَكِّلا",
            "إِذَا مَا أَرَدْتَ الدَّهْرَ تَقْرَأُ فَاسْتَعِذْ ... جِهَارًا مِنَ الشَّيْطَانِ بِاللَّهِ مُسْجَلَا",
            "عَلَى مَا أَتَى فِي النَّحْلِ يُسْرًا وَإِذْ ... لَرَبِّكَ تَنْزِيهَا فَلَسْتَ مُجَهَّلَا",
            "وَقَدْ ذَكَرُوا لَفْظَ الرَّسُولِ فَلَمْ يَزِدُ ... وَلَوْ صَحَّ هَذَا النَّقْلُ لَمْ يُبْقِ مُحَمَلاً",
            "وَفِيهِ مَقَالُ فِي الْأُصُولِ فُرُوعُهُ ... فَلَا نَقْدُ مِنْهَا بَاسِقًا وَمُظَلَّلَا",
            "وَاخْفَاؤُهُ فَضْلُ أَبَاهُ وَعَاتُنَا ... وَكَمْ مِنْ فَتَى كَالْهُدَوِى فِيهِ أَعْمَلَا",
            "وَبَسْمَلَ بَيْنَ السُّورَتَيْنِ بِسُنَّةِ ... رِجَالٌ نَمَوْهَا دِرْيَةً وَتَحَلَا",
                        "وَوَصْلُكَ بَيْنَ السُّوَرَتَيْنِ فَصَاحَةً ... وَصِلْ وَاسْكُتَنْ كُلِّ جَلَايَاهُ حَصَلَا",
            "وَلَا نَصَّ كَلَّا حَبَّ وَجْهُ ذَكَرْتُهُ ... وَفِيهَا خِلافُ خَيدُهُ وَاضِحُ الطُّلَى",
            "وَسَكْتُهُمُ الْخَتَارُ دُونَ تَنَفْسٍ ... وَبَعْضُهُم فِي الْأَرْبَعِ الزُّهْرِ بَسْمَلَا",
            "لَهُمْ دُونَ نَصٍّ وَهُوَ فِيهِنَّ سَاكِتُ ... بِحَمْزَةَ فَافْهَمْهُ وَلَيْسَ مُخَذَلَا",
            "وَمَهُمَا تَصِلُهَا أَوْ بَدَأْتَ بَرَاءَةً ... لِتَنْزِيلِهَا بِالسَّيْفِ لَسْتَ مُبَسْمِلًا",
            "وَلَا بُدَّ مِنْهَا فِي ابْتِدَائِكَ سُورَةً ... سِوَاهَا وَفِي الْأَجْزَاءِ خَيْرَ مَنْ تَلَا",
            "وَلَهُمَا تَصِلُّهَا مَعْ أَواخِرِ سُورَةٍ ... فَلَا تَقِفَنَّ الدَّهْرَ فِيهَا فَتَثْقُلَا",
            "وَمَالِكِ يَوْمِ الدِّينِ رَاوِيهِ نَاصِرُ ... وَعِندَ سِرَاطٍ وَالصِّرَاطِ لِقُبُلَا",
            "بِحَيْثُ أَتَى وَالصَّادَ زَايًا أَشِمَّهَا ... لَدَى خَلَفٍ وَاشْمِمْ بِخَلَّادِ الْأَوْلَا",
            "عَلَيْهِمْ إِلَيْهِمْ حَمْزَةٌ وَلَدَيْهِم ... جَمِيعًا بِضَمَّ المَاءِ وَقْفًا وَمَوْصِلَا",
            "وَصِلٌ ضَمَّ مِيمِ الْجَمع قَبْلَ مُحَرَّكِ ... ذِرَاعًا وَقَالُونَ بِتَحْيِيرِهِ جَلَا",
            "وَمِنْ قَبْلِ هَمْزِ الْقَطْعِ صِلْهَا لِوَرْشِهِمْ ... وَأَسْكَنَهَا الْبَاقُونَ بَعْدُ لِتَكْمُلا",
            "وَمِنْ دُونِ وَصْلِ ضَمَّهَا قَبْلَ سَاكِن ... لِكُلِّ وَبَعْدَ الهَاءِ كَسْرُ فَتَى الْعَلَا",
            "مَعَ الْكَسْرِ قَبْلَ الهَا أَوِ الْيَاءِ سَاكِنا ... وَفِي الْوَصْلِ كَسْرُ الهَاءِ بِالضَّمِّ شَمْلَلَا",
            "كَمَا بِهِمُ الأَسْبَابُ ثُمَّ عَلَيْهِمُ الـ ... قِتَالُ وَقِفْ لِلكُلِّ بِالكَسْرِ مُكَمِلا",
            "وَدُونَكَ الإِدْغَامَ الْكَبِيرَ وَقُطْبُهُ ... أَبُو عَمْرٍو الْبَصْرِيُّ فِيهِ تَحَفَّلَا",
            "فَفِي كَلِمَةٍ عَنْهُ مَنَاسِكَكُم وَمَا ... سَلَكَكُم وَبَاقِي البَابِ لَيْسَ مُعَوَّلاً",
            "وَمَا كَانَ مِنْ مِثْلَيْنِ فِي كِلْمَتَيْهِمَا ... فَلَا بُدَّ مِنْ إِدْغَامِ مَا كَانَ أَوَّلَا",
            "كَيْعَامُ مَا فِيهِ هُدًى وَطِيعِ عَلَى ... قُلُوبِهِمْ وَالْعَفْوَ وَأَمُرُ تَمَثَّلَا",
            "إِذَا لَمْ يَكُنْ تَا مُخَبِرٍ أَوْ مُخَاطَبٍ ... أَوِ الْمُكْتَى تَنْوينَهُ أَوْ مُثَقَّلا",
            "كَكُنتُ تُرَاباً أَنْتَ تُكْرِهُ وَاسِعٌ ... عَلِيمٌ وَأَيْضًا تَمَّ مِيقَاتُ مُلا",
            "وَقَدْ أَظْهَرُوا فِي الْكَافِ يَحْزُنُكَ كُفْرُهُ ... إِذِ النُّونُ تَخْفَى قَبْلَهَا لِتُجَلَا",
            "وَعِنْدَهُمُ الْوَجْهَانِ فِي كُلِّ مَوْضِعِ ... تَسَمَّى لِأَجَلِ الْحَذْفِ فِيهِ مُعَلَّلَا",
            "كَيَبْتَغِ مَحْزُومًا وَإِنْ يَكُ كَاذِبًا ... وَيَخْلُ لَكُمْ عَنْ عَالِمِ طَيِّبِ الْخَلَا",
            "وَيَا قَوْمِ مَا لِي ثُمَّ يَا قَومِ مَنْ بِلَا ... خِلَافٍ عَلَى الْإِدْغَامِ لَا شَكَ أُرْسِلَا",
            "وَإِظْهَا رُ قَوْمٍ أَلَ لُوطٍ لِكَوْنِهِ ... قَلِيلَ حُرُوفٍ رَدَّهُ مَنْ تَنَبَّلَا",
            "بِإِدْغَامِ لَكَ كَيْدًا وَلَوْ حَجَ مُظْهِرُ ... بِإِعْلَالِ ثَانِيهِ إِذَا صَحَ لَاعْتَلَى",
            "فَإِبْدَ الهُ مِنْ هَمَزَةٍ هَاءُ أَصْلُهَا ... وَقَدْ قَالَ بَعْضُ النَّاسِ مِنْ وَاوِ ابْدِلَا",
            "وَوَاوُ هُوَ المَضْمُومِ هَاءً كَهُو وَ مَنْ ... فَأَدْغِمْ وَمَنْ يُظْهِرِ فَبِ الْمَدِّ عَلَّلا",
            "وَيَأْتِي يَوْمَ أَدْغَمُوهُ وَنَحْوَهُ ... وَلَا فَرْقَ يُبْغِي مَنْ عَلَى الْمَدِ عَوْلَا",
            "وَقَبْلَ يَيْنَ اليَاءُ فِي اللَّاءِ عَارِضُ ... سُكُونًا أَوَاصْلًا فَهُوَ يُظْهِرُ مُسْهِلا",
            "وَإِنْ كَمَةٌ حَرْفَانِ فِيهَا تَقَارَبَا ... فَإِدْغَامُهُ لِلْقَافِ فِي الْكَافِ مُجْتَلَى",
            "وَهَذَا إِذَا مَا قَبْلَهُ مُتَحَرِّكُ ... مُبِينٌ وَبَعْدَ الْكَافِ مِيمٌ تَخَلَّلا",
            "كَيْرْزُقُكُمْ وَاثَقَكُمْ وَخَلَقَكُمْ ... وَمِيثَاقَكُمْ أَظْهَرُ وَنَرْزُقُكَ انْجَلَى",
            "وَإِدْغَامُ ذِي التَّحْرِيمِ طَلَقُكُنَّ قُلْ ... أَحَقُّ وَبِالتَّأْنِيثِ وَالْجَمْعِ أُثْقِلَا",
            "وَمَهُمَا يَكُونَا كِلْمَتَيْنِ فَمُدْعِمُ ... أَوَائِلَ لِلَّهِ الْبَيْتِ بَعْدُ عَلَى الْوِلَا",
            "شِفَا لَّمْ تَضِقَ نَفْسًا بِهَا رُمْ دُّوَان ... تَوَى كَانَ ذَا حَسَنِ سَأَى مِنْهُ قَدْ جَلَا",
            "إِذَا لَمْ يُنَوَّنُ أَوْ يَكُن تَا مُخَاطَبٍ ... وَمَا لَيْسَ مَجَزُومًا وَلا مُتَتَقِلَا",
            "فَزُحْزِحَ عَنِ النَّارِ الَّذِي حَاهُ مُدْغَمُ ... وَفِي الْكَافِ قَافُ وَهُوَ فِي الْقَافِ أُدْخِلَا",
            "خَلَقَ كُلَّ شَيْءٍ لَكَ قُصُورًا وأَظْهَرَا ... إِذَا سَكَنَ الْحَرْفُ الَّذِي قَبْلُ أَقْبَلَا",
            "وَفِي ذِي الْمَعارِج تَعْرُجُ الحِيمُ مُدْغَمُ ... وَمِنْ قَبْلُ أَخْرَجَ شَطْأَهُ قَد تَثَقَلَا",
            "وَعِنْدَ سَبِيلًا شِينُ ذِي الْعَرْشِ مُدْعَمُ ... وَضَادَ لِبَعْضِ شَأْنِهِمْ مُدْعَا تَلَا",
            "وَفِي زُوِّجَتْ سِينُ النَّفُوسِ وَمُدْغَمُ ... لَهُ الرَّأْسُ شَيْئًا بِاخْتِلَافٍ تَوَصَّلا",
            "وَالدَّالِ تَرَبُ سَهْلِ كَا شُدًا صَفَا ... ثُمَّ زُهْدٌ صِدْقُهُ ظَاهِرُ جَلَا",
            "وَلَمْ تُدَّغَمْ مَفْتُوحَةً بَعْدَ سَاكِن ... بِحَرْفٍ بِغَيْرِ التَّاءِ فَاعْلَمُهُ وَاعْمَلَا",
            "وَفِي عَشْرِهَا وَالطَّاءِ تُدْعَمُ تَاؤُهَا ... وَفِي أَحْرُفٍ وَجْهَانِ عَنْهُ تَهَلَّلا",
            "فَمَعْ حُلُوا التَّوْرَاةَ ثُمَّ الزَّكَاةَ قُلْ ... وَقُلْ اتِ ذَا الْ وَلْتَأْتِ طَائِفَةٌ عَلَا",
            "وَفِي جِنَّتِ شَيْئًا أَظْهَرُوا لِخِطَابِهِ ... وَنُقْصَانِهِ وَالْكَسْرُ الإِدْعَامَ سَهَلَا",
            "وَفِي خَمْسَةٍ وَهُيَ الْأَوَائِلُ ثَاؤُهَا ... وَفِي الصَّادِ ثُمَّ السِّينِ ذَالُ تَدَخَلَا",
            "وَفِي اللَّامِ رَاءَ وَهْيَ فِي الرَّا وَأَظْهَرَا ... إِذَا انْفَتَحَا بَعْدَ الْمُسَكِّنِ مُنْزِلَا",
            "سِوَى قَالَ ثُمَّ النُّونُ تُدْعَمُ فِيهِمَا ... عَلَى إِثْرِ تَجْرِيكِ سِوَى نَحْنُ مُسْجَلًا",
            "وَتَسْكَنُ عَنْهُ المِيمُ مِنْ قَبْلِ بَائِهَا ... عَلَى إِثْرِ تَجْرِيكِ فَتَخْفَى تَنَزَّلَا",
            "وَفِي مَن يَشَاءُ بَا يُعَذِّبُ حَيْثُمَا ... أَتَى مُدْغَمْ فَادْرِ الْأُصُولَ لِتَأْصُلَا",
            "وَلَا يَمْنَعُ الْإِدْغَامُ إِذْ هُوَ عَارِضُ ... إِمَالَةَ كَالْأَبْرَارِ وَالنَّارِ أَثْقَلَا",
            "وَأَشْهِمْ وَرَمٌ فِي غَيْرِ بَاءٍ وَمِيمِهَا ... مَعَ الْبَاءِ أَوْمِيمٍ وَكُنْ مُتَأَمِّلَا",
            "وَإِذْ غَامُ حَرْفٍ قَبْلَهُ صَحَ سَاكِنُ ... عَسِيرٌ وَبِالْإِخْفَاءِ طَبَقَ مَفْصِلا",
            "خُذِ الْعَفْوَ وَأْمُرْ ثُمَّ مِنْ بَعْدِ ظُلِمِهِ ... وَفِي الْمَهْدِ ثُمَّ الْخُلْدِ وَالْعِلْمِ فَاسْمَلَا",
            "وَلَمْ يَصِلُوا هَا مُضْمَر قَبْلَ سَاكِنٍ ... وَمَا قَبْلَهُ التَّجْرِيكُ لِلْكُلِّ وُصِلَا",
            "وَمَا قَبْلَهُ التَّسْكِينُ لِابْنِ كَثِيرِهِمْ ... وَفِيهِ مُهَانَا مَعَهُ حَفْصُ أَخُو ولا",
            "وَسَكِنْ يُؤَدِّهُ مَعْ نُوَلِهِ وَنُصْلِهِ ... وَنُؤْتِهِ مِنْهَا فَاعْتَبِرُ صَافِيًا حَلَا",
            "وَعَنْهُمْ وَعَنْ حَفْصٍ فَأَلْقِهُ وَيَتَّقِهُ ... حَى صَفْوَهُ قَوْمٌ بِخَلْفٍ وَأَنْهَلَا",
            "وَقُلْ بِسُكُونِ القَافِ وَالْقَصْرِ حَفْصُهُمْ ... وَيَأْتِه لدى طه بالإِسْكَانِ يَجْتَلَى",
            "وَفِي الْكُلِّ قَصْرُ الْهَاءِ بَانَ لِسَانُهُ ... بِخُلْفٍ وَفِي طَهُ بِوَجْهَيْنِ نَجِلَا",
            "واسكَان يَرْضَهُ من يمنهُ لُبْسُ طَيِّبَ ... بِخُلْفِهَا وَالْقَصْرَ فَاذْكُرْهُ نُوْفَلَا",
            "لَهُ الرَّحْبُ وَالزِّلْزَالُ خَيْرًا يَرَهُ بِهَا ... وَشَرَّا يَرَهُ حَرْفَيْهِ سَكِنْ لِيَسْهُلَا",
            "وَعَلَى نَفَر أَرْجِهُ بِالْهَمْزِ سَاكِنَا ... وَفِي المَاءِ ضَمَّ لَفَ دَعْوَاهُ خَرَمَلَا",
            "وَأَسْكِنْ نَصِيرًا فَازَ وَاكْسِرْ لِغَيْرِهِمْ ... وَصِلْهَا جَوَادًا ذُونَ رَيْبٍ لِتُوَصَلَا",
            "إِذَا أَلِفٌ أَوْ يَاؤُهَا بَعْدَ كَسَرَةٍ ... أَوِ الْوَا وُ عَنْ كَمْ لَقِي الْهَمَزَ طُولَا",
            "فَإِنْ يَنْفَصِلْ فَالْقَصَرَ يَا دِرْهُ طَالِبًا ... بِخَلْفِيهَا يُرْوِيكَ دُرًا وَمُخْضَلَا",
            "كَجِيَّ وَعَنْ سُوءٍ وَشَاءَ اتِّصَالُهُ ... وَمَفْصُولُهُ فِي أُمَّهَا أَمْرُهُ إِلَى",
            "وَمَا بَعَدَ هَمْزِ ثَابِتٍ أَوْ مُغَيْرِ ... فَقَصْرُ وَقَدْ يُروى لِوَرْشِ مُطَوَّلًا",
            "وَوَسَطَهُ قَوْمُ كَآمَنَ هَؤُلا ... آلِهَةٌ آتَى لِلإِيمَانِ مُثْلَا",
            "سِوَى يَاءِ إِسْرَائِيلَ أَوْ بَعْدَ سَاكِن ... صَحِيحٍ وَمَسْئُولًا اسْأَلَاَ",
            "وَمَا بَعْدَ هَمْزِ الْوَصْلِ ايتِ وَبَعْضُهُمْ ... يُؤَاخِذُكُمُ الْآنَ مُسْتَفْهِمَا تَلَا",
            "وَعَادَاةٍ الأُولَى وَابْنُ غَلْبُونَ طَاهِرُ ... بِقَصْرِ جَمِيعِ الْبَابِ قَالَ وَقَوْلَا",
            "وَعَنْ كُلِهِمْ بِالْمَدِّ مَا قَبْلَ سَاكِن ... وَعِنْدَ سُكُونِ الْوَقْفِ وَجْهَانِ أُصِلَا",
            "وَمُدَّ لَهُ عِنْدَ الْفَواتِحِ مُسْتَبِعاً ... وَفِي عَيْنِ الْوَجْهَانِ وَالطُّولُ فَضْلًا",
            "وَفِي نَحْوِطُهَ الْقَصْرُ إِذْ لَيْسَ سَاكِنُ ... وَمَا فِي أَلِفٌ مِنْ حَرْفِ مَدٍ فَيُمْطَلَا",
            "وَإِنْ تَسْكُنِ الْيَا بَيْنَ فَتْحٌ وَهَمْزَةٍ ... بِكُلِّمَةٍ أَوْ وَاوْ فَوَجْهَانِ حُمِّلا",
            "بِطُولٍ وَقَصْرٍ وَصْلُ وَرْشٍ وَوَقْعُهُ ... وَعِند سُكُونِ الْوَقْفِ لِلْكُلِّ أُعْمِلَا",
            "وَعَنْهُمْ سُقُوطُ الْمَدِّ فِيهِ وَوَرْشُهُمْ ... يُوَافِقُهُمْ فِي حَيْثُ لَا هَمْزَ مُدْخَلَا",
            "وفي وَاوِ سَوَاتٍ خِلَافَ لِوَرْشِهِمْ ... وَعَنْ كُلِّ الْمَوْءُودَةُ اقْصُرْ وَمَوثِلًا",
            "وَتَهِيلُ أُخْرَى هَمْزَتَيْنِ بِكِلْمَةٍ ... سَمَا وَبِذَاتِ الْفَتْحِ خُلْفُ لِتَجْمَلَا",
            "وَقُلْ أَلِفَا عَنْ أَهْلِ مِصْرَ تَبَدَّلَتْ ... لِوَرْشِ وَفِي بَغْدَادَ يُروى مُسَهَّلَا",
            "وَحَقَّقَهَا فِي فُصِّلَتْ صُحْبَهُ وَأَعْجَمِيٌّ ... وَالا ولَى أَسْقِطَنَّ لِتَسْهُلَا",
            "وَهَمَرَةُ أَذْهَبْتُمْ فِي الْأَحْقَافِ شُفِعَتْ ... بِأُخْرَى كَمَا دَامَتْ وِصَالًا مُوصَّلَا",
            "وَفِي نُونَ فِي أَنْ كَانَ شَفَعَ حَمْزَةٌ ... وَشُعْبَةُ أَيْضًا وَالدِّمَشْقِى مُسَهِّلًا",
            "وَفِي آلِ عِمْرَانٍ عَنِ ابْنِ كَثِيرِهِمْ ... يُشْفَعُ أَنْ يُؤْتَى إِلَى مَا تَسَهَلَا",
            "وَطُهُ وَفِي الْأَعْرَافِ وَالشُّعَرَا بِهَا ... آمَنْتُمْ لِلكُلِّ ثَالِثَا أَبْدِلَا",
            "وَحَقَّقَ ثَانِ صُحْبَةٌ وَالقُنْبُلٍ ... بِإِسْقَاطِهِ الْأُولَى بِطَهُ تُقْبِلَا",
            "وَفِي كُلِّهَا حَفْصُ وَأَبْدَلَ ... في الأَعْرَافِ مِنْهَا الوَاوَ وَالْمُلْكِ مُوصِلًا",
            "وَإِنْ هَمْزُ وَصْلٍ بَيْنَ لَام مُسَكَنٍ ... وَهَمْزَةِ الإِسْتِفْهَامِ فَامْدُدُهُ مُبْدِلَا",
            "فَلِلْكُلِّ ذَا أَوْلَى وَيَقْصُرُهُ الَّذِي ... يُسَبِّلُ عَنْ كُلِّ كَالَانَ مُثْلَا",
            "وَلَا مَدَّ بَيْنَ الهَمْزَتَيْنِ هُنَا وَلَا ... بِحَيْثُ ثَلَاثُ يَتَّفِقْنَ",
            "وَأَضْرُبُ جَمْعِ الْهَمَزَتَيْنِ ثَلَاثَهُ ... أَنْذَرْتَهُمْ أَمْ لَمْ أَئِنَّا أَنْزِلَا",
            "وَمَدكَ قَبْلَ الْفَتْحِ وَالكَسْرِ حَجَةٌ ... بِهَا وَقَبْلَ الْكَسْرِ خُلْفٌ لَهُ وَلَا",
            "وَفِي سَبْعَةٍ لَا خُلْفَ عَنْهُ بِمَريم ... وَفِي حَرْفِي الْأَعْرَافِ وَالشَّعَا الْعُلَى",
            "أَئِنَّكَ أَيْفَكًا مَعَا فَوْقَ صَادِهَا ... وَفِي فُصِّلَتْ حَرْفٌ وَبِالْخُلُفِ سُهْلًا",
            "وَآئِمَةٌ بِالْخُلْفِ قَدْ مَدَ وَحْدَهُ ... وَسَهَلْ سَمَا وَصَفَا وَفِي التَّخَوْ أُبْدِلَا",
            "وَمَتِّكَ قَبْلَ الظَّمِ حَبِيبُهُ بِخُلْفِي ... مَا بَرَا وَجَاءَ لِيَفْصِلا",
            "وَفِي آلِ عِمْرَانٍ رَوَوْا لِهِشَامِهِمْ ... كَحَفْصٍ وَفِي الْبَاقِي كَقَالُونَ وَاعْتَلَى",
            "وَأَسْقَطَ الأُولَى فِي اتَّفَاقِهَا مَعَا ... إِذَا كَانَتَا مِنْ كِلْمَتَيْنِ فَتَى الْعَلَا",
            "نَجَا أَمْرُنَا مِنَ السَّمَا إِنَّ أَوْلِيَا ... أُولَئِكَ أَنْوَاعُ اتَّفَاقِ تَجَمَّلَا",
            "وَقَالُونُ وَالْبَرِّئُ فِي الْفَتْحِ وَافَقَا ... وَفِي غَيْرِهِ كَاليَا وَكَالْوَاوِ سَهَلَا",
            "وَبِالسُّوءِ إِلَّا أَبْدَلَا تُمَّ أَدْغَمَا ... وَفِيهِ خِلَافٌ عَنْهُمَا لَيْسَ مُقْفَلَا",
            "وَالْأُخْرَى كَمَدٍ عِنْدَ وَرْشِ وَقُنْبُلٍ ... وَقَدْ قِيلَ مَحْضُ الْمَدِ عَنْهَا تَبَدَّلَا",
            "وَفِي هُوَلا إِنْ وَالْبِغَا إِنْ لَوَرْشِهِمْ ... بِيَاءِ خَفِيفِ الكَسْرِ بَعْضُهُم تَلَا",
            "وَإِنْ حَرْفُ مَةٍ قَبْلَ هَمْزِ مُغَيَّرٍ ... يَجْزْ قَصُرُهُ وَالْمُدَّ مَا زَالَ أَعْدَلَا",
            "وَتَشْهيلُ الْأُخْرَى فِي اخْتِلَا فِهِمَا سَمَا ... تَفِيَّ إِلَى مَعْ جَاءَ أُمَّةً أُنْزِلَا",
            "نَشَاءُ أَصَبْنَا وَالسَّمَاءِ أَوِ ائْتِنَا ... فَنَوْعَانِ قُل كَالْيَا وَكَالْوَا وِ سُهْلًا",
            "وَنَوْعَانِ مِنْهَا أُبْدِلَا مِنْهُمَا وَقُلْ ... يَشَاءُ إِلَى كَالْيَاءِ أَقْيَسُ مَعْدِلَا",
            "وَعَنْ اكْثَرِ الْقُرَاءِ تُبْدَلُ وَاوَهَا ... وَكُلُّ بِهَزِ الكُلِّ يَبْدَا مُفَصِّلَا",
            "وَالإِبْدَالُ مَحَضٌ وَالْمُسَهَّلُ بَيْنَ مَا ... هُوَ الْهُمَرُ وَالْحَرْفِ الَّذِي مِنْهُ أُشْكِلَا",
            "إِذَا سَكَنَتْ فَاءً مِنَ الْفِعْلِ هَمَرَةٌ ... فَوَرْضٌ يُرِيهَا حَرْفَ مَةٍ مُبَدِّلَا",
            "سِوى جُمْلَةِ الْإِيوَاءِ وَالْوَاوُ عَنْهُ إِنْ ... لَفَتَحَ إِثْرَ الضَّمِ نَحْو مُؤَجَلًا",
            "وَيُدَلُ لِلسُّوسِي كُلُّ مُسَكَنِ ... مِنَ الْهُمْزِ مَنَا غَيْرَ مَجْزُومِ أَهْمِلا",
            "تَسَوُّ وَ نَشَأْسِتٌ وَعَشْرَ يَنَا وَمَعْ ... يُهَيِّئْ وَنَنْسَاهَا يُنَبَّأَ تَكَمَلَا",
            "وَهَيْئَ وَأَنْبِئْهُمْ وَنَبِّئُ بَأَرْبَعٍ ... وَأَرْجِئْ مَعًا وَاقْتَرَ أَثَلَاثًا فَحَصَلَا",
            "وَتُووى وَتُؤْوِيهِ أَخَفُ بِهَمْزِهِ ... وَرِثْيَا بِتَرْكِ الْهَرِ يُشْبِهُ الاِمْتِلَا",
            "وَمُوْصَدَةٌ أَوْصَدْتُ يُشْبِهُ كُلُّهُ ... تَخَيَّرَهُ أَهْلُ الأَدَاءِ مُعَلَّلا",
            "وَبَارِكُمْ بِالْهَمْزِ حَالَ سُكُونِهِ ... وَقَالَ ابْنُ غَلْبُونِ بِيَاءٍ تَبَدَّلَا",
            "وَوَالَاهُ فِي بِثْرٍ وَفِي بِئْسَ وَرْشُهُمْ ... وَفِي الذِّنْبِ وَرَسُ وَالْكِسَائِي فَأَبْدَلَا",
            "وَفِي لُؤْلُو فِي الْعُرْفِ وَالتَّكْرِ شُعَبَةٌ ... وَبِالتَكُمُ الدُّورِي وَالإِبْدالُ يُجْتَلَى",
            "وَوَرْقٌ لِئَلَّا وَالنَّسِي بِيَائِهِ ... وَأَدْغَمَ فِي يَاءِ النَّسِي فَثَقَلَا",
            "وَإِبْدَالُ أُخْرَى الْهَمْزَتَيْنِ لِكُلِّهِمْ ... إِذَا سَكَنَتْ عَزْمُ كَادَمَ أُوهِلا",
            "وَحَرِّكَ لِوَرْشِ كُلَّ سَاكِنَ اخِرِ ... صَحِيحِ بِشَكْلِ الْمُفْرِ وَاحْذِفُهُ مُسْهِلا",
            "وَعَنْ حَمْزَةٍ فِي الْوَقْفِ خُلْفٌ وَعِندَهُ ... رَوَى خَلَفٌ فِي الْوَصْلِ سَكْنَا مُقَلَّلَا",
            "وَيَسْكُتُ فِي شَيْ وَشَيْئًا وَبَعْضُهُمْ ... لَدَى اللَّامِ لِلتَّعْرِيفِ عَنْ حَمْزَةٍ تَلَا",
            "وَشَيْ وَشَيْئًا لَمْ يَزِدْ وَلِنَافِعِ ... لَدَى يُونُسِ الْآنَ بِالنَّقْلِ نُقِلَا",
            "وَقُلْ عَادَانِ الْأُولَى بِإِسْكَانِ لَامِهِ ... وَتَنْويهُ بِالكَسْرِ كَاسِيهِ",
            "وَأَدْغَمَ بَاقِيهِمْ وَبِالنَّقْلِ وصْلُهُمْ ... وَبَدْؤُهُمْ وَالْبَدْءُ بِالْأَصْلِ فَضْلًا",
            "لِقَالُونَ وَالْبَصْرِى وَتُهُمَزُوَاؤُهُ ... لِقَالُونَ حَالَ النَّقْلِ بَدْءًا وَمَوْصِلَا",
            "وَتَبْدَا بِهَمْزِ الْوَصْلِ فِي النَّقْلِ كُلِّهِ ... وَإِنْ كُنْتَ مُعْتَدًا بِعَارِضِهِ فَلَا",
            "وَنَقْلُ رِدًا عَنْ نَافِعٍ وَكِتَابِيَهُ ... بِالْإِسْكَانِ عَنْ وَرْشِ أَصَحَ تَقَبُّلا",
            "وَحَمْزَةُ عِنْدَ الْوَقْفِ سَهَلَ هَمَزَهُ ... إِذَا كَانَ وَسُطًا أَوْ تَطَرَّفَ مَنْزِلَا",
            "فَأَبْدِلَهُ عَنْهُ حَرْفَ مَةٍ مُسَكِّنَا ... وَمِنْ قَبْلِهِ تَحْرِيكُهُ قَد تَنَزَلَا",
            "وَحَرِّكْ بِهِ مَا قَبْلَهُ مُتَسَكِنَا ... وَأَسْقِطْهُ حَتَّى يَرْجِعَ اللَّفْظُ أَسْهَلَا",
            "سِوَى أَنَّهُ مِنْ بَعْدِ مَا أَلِفِ جَرَى ... يسَ لَهُ مَهُمَا تَوَسَطَ مَدْخَلَا",
            "وَيُبْدِلُهُ مَهُمَا تَطَرفَ مِثْلَهُ ... وَيَقْصُرُ أَوْ يَمْضِي عَلَى الْمَدِ أَطْوَلَا",
            "وَيُدْغِمُ فِيهِ الْوَاوَ وَالْيَاءَ مُبْدِلًا ... إِذَا زِيدَ نَا مِنْ قَبْلُ حَتَّى يُفَصَّلَا",
            "وَيُسْمِعُ بَعْدَ الكَسْرِ وَالصَّمِ هَمَزَهُ ... لَدَى فَتْحِهِ يَاءً وَوَاوْا مُحَولَا",
            "وَفِي غَيْرِ هَذَا بَيْنَ بَيْنَ وَمِثْلُهُ ... يَقُولُ هِشَامٌ مَا تَطَرَّفَ مُسْهِلا",
            "وَرِئْيَا عَلَى إِظْهَارِهِ وَادْ عَامِهِ ... وَبَعْضُ بِكَسْرِ الهَا لِيَاءٍ تَحَوَّلا",
            "كَقَوْلِكَ أَنْبِتُهُمْ وَنَبِّئُهُمْ وَقَدْ ... رَوْوْا أَنَّهُ بِالْخَطِ كَانَ مُسَلَا",
            "فَفِي الْيَا يَلِي وَالْوَاءِ وَالْحَذْفِ رَحْمَهُ ... وَالْأَخْفَشُ بَعْدَ الكَسْرِنَا الضَّمَّ أَبْدَلَا",
            "بِيَاءِ وَعَنْهُ الْوَاوُ فِي عَكْسِهِ وَمَنْ ... حَكَى فِيهَمَا كَالْيَا وَكَالُوا أَعْضَلَا",
            "وَمُسْتَهْزِءُونَ الْحَذْفُ فِيهِ وَيَخْرُه ... وَضَمْ وَكَسْرٌ قَبْلُ قِيلَ وَأُخْلَا",
            "وَمَا فِيهِ يُلْقَى وَاسِطًا بِزَوَائِدٍ ... دَخَلْنَ عَلَيْهِ فِيهِ وَجْهَانِ أُعْمِلًا",
            "كَمَا هَا وَيَا وَاللَّامِ وَالبَا وَنَخْوِهَا ... وَلَامَاتِ تَعْرِيفِ لِمَنْ قَد تَّأَ مَلَا",
            "وَأَشْمِمْ وَرُمْ فِيمَا سِوَى مُتَبَدِّلٍ ... بِهَا حَرْفَ مَدٍ وَاعْرِفِ البَابَ مَحْفِلَا",
            "وَمَا وَاوْ أَصَلَّى تَسَكَّنَ قَبْلَهُ ... أَوِ الْيَا فَعَنْ بَعْضٍ بِالْإِدْغَامِ حُمِلا",
            "وَمَا قَبْلَهُ التَّحْرِيكِ أَوْ أَلِفٌ مُحَرَ ... رَكًا طَرَفًا فَالْبَعْضُ بِالرَّوْمِ سَهَّلَا",
            "وَمَنْ لَمْ يَرَمْ وَاعْتَدَ مَحْضَا سُكُونَهُ ... وَأَلْحَقَ مَفْتُوحًا فَقَدْ شَدَّ مُوغِلَا",
            "وَفِي الْهَمْزِ أَنْخَاءُ وَعِندَ مُخَاتِهِ ... يُضِلُّ سَنَاهُ كُلَّمَا اسْوَدَّ أَلْيَلَا",
            "سَأَذْكُرُ الْفَاظَا تَلِيهَا حُرُوفُهَا ... بِالإِظْهَارِ وَالْإِدْغَامِ تُروى وَمُخْتَلَى",
            "فَدُونَكَ إِذْ فِي بَيْتِهَا وَحُرُوفَهَا ... وَمَا بَعْدُ بِالتَّقْبِيدِ قُدُهُ مُذَلَّلَا",
            "سَأُسْمِي وَبَعْدَ الْوَاوِ تَسْمُو حُرُوفُ مَنْ ... تَسَمَّى عَلَى سِيمَا تَرُوقُ مُقَبَّلا",
            "وَفِي دَالِ قَدْ أَيْضًا وَتَاءِ مُؤنَتْ ... وَفِي هَلْ وَبَلْ فَاحْتَلْ بِذِهْنِكَ حَيَلًا",
            "نَعَمْ إِذْ تَمَسَّتْ زَيْنَبُ صَالَ كُلَّهَا ... جَمَالٍ وَاصِلًا مَنْ تَوَصَّلَا",
            "فَإِظْهَارُهَا أَجْرَى دَوَامَ نَسيمِهَا ... وَأَظْهَرَ رَنَا قَوْلِهِ وَاصِفٌ جلا",
            "وَأَدْغَمَ ضَنكًا وَاصِلٌ تُومَ ذُرِّهِ ... وَأَدْغَمَ مُوْلَى وُحْدُهُ دَائِمٌ وَلَا",
            "وَقَدْ سَحَبَتْ أَيْلًا مَا ظَلَّ زَرْنَبٌ ... جَلَتْهُ صَبَاهُ شَائِعًا وَمُعَلَّلَا",
            "فَأَظْهَرَهَا بَدَا دَكَ وَاضِحَا ... وَأَدْغَمَ وَرُشُ ظَمَانَ وَامْتَلَا",
            "وَأَدْغَمَ مُرُووَاكِفٌ ضَيْرَ ذَابِل ... زَوَى ظِلَهُ وَغُرُ تَسَدَاهُ كُلِّ كَلَا",
            "وَفِي حَرْفِ زَيَّنَّا خِلَافٌ وَمُظْهَرٌ ... هِشَامٌ بِصَ حَرفَهُ مُتَحَمِلا",
            "وَأَبْدَتْ سَنَا صَفَتْ زُرقُ ظُلْمِهِ ... جَمَعَنَ وُرُودًا بَارِدًا عَطِرَ الطَّلَا",
            "فَإِظْهَارُهَا دُرِّ بُدُورُهُ ... وَأَدْغَمَ وَرْسٌ ظَافِرًا وَ مُخَوّلَا",
            "وَأَظْهَرَ كَهْفٌ وَافِرُ سَيْبُ جُودِهِ ... رَبِّي وَفِي عُصْرَةً وَمُحَلَّلا",
            "وَأَظْهَرَ رَاوِيهِ هِشَامٌ لَهُدِّمَتْ ... وَفِي وَجَبَتْ خُلْفُ ابْنِ ذَكْوَانَ يُفْتَلَى",
            "أَلا بَلْ وَهَلْ تَرَوى ثُنَا عَنِ زَيْنَبٍ ... سَمِيرَ نَواهَا طَلَعَ ر وَمُبْتَلَى",
            "وَأَدْغَمَ فَاضِلَّ وَقُورٌ ثَنَاهُ ... سَرَتَيْمًا وَقَدْ حَلَا",
            "وَبَلْ فِي النِّسَا خَلَادُهُمْ بِخِلَافِهِ ... وَفِي هَلْ تَرَى الْإِدْعَامُ حُبَّ وَحُمِلا",
            "وَأَظْهِرُ لَدَى وَاعٍ نَبِيلٍ ضَمَانُهُ ... وَفِي الرَّعْدِ هَلْ وَاسْتَوْفِ لَا زَاجِرًا هَلَا",
            "وَلَا خُلْفَ فِي الْإِنْعَامِ إِذا ظَالِمٌ ... وَقَديمَت تُعْدٌ وَسِيمَا تَبَتَلَا",
            "وَقَامَت تُربهِ طِيبَ وَصْفِهَا ... وَقُلْ بَلْ وَهَلْ رَاهَا لَبِيبُ وَيُعْقِلَا",
            "وَمَا أَوَّلُ الِمِثْلَيْنِ فِيهِ مُسَكَنُ ... فَلَا بُدَّ مِنْ إِدْغَامِهِ مُتَمَتِّلَا",
            "وَإِدْعَامُ بَاءِ الْجَزْمِ فِي القَاءِ قَدْ رَسَا ... جَمِيلًا وَخَيْرٌ فِي يَتُبْ قَاصِدًا وَلَا",
            "وَمَعْ جَزْمِهِ يَفْعَلْ بِذَلِكَ سَلَّمُوا ... وَيَخْسِفُ بِهِمْ رَاعَوْا وَشَذَا تَثَقُلَا",
            "وَعُذْتُ عَلَى إِدْغَامِهِ وَنَبَذْتُهَا ... شُوَاهِدُ حَمَادٍ وَأُورِثْتُمْ لَهُ شُرْعُهُ",
            "وَالرَّاءُ جَزْمًا بِلا مِهَا ... كَوَاصْبِرْ لِحُكْمِ طَالَ بِالْخَلْفِ يَذْبُلَا",
            "وَيَا سِينَ أَظْهَرَ عَن فَتَى حَقَّهُ بَدَا ... وَنُونَ وَفِيهِ الْخُلْفُ عَنْ وَرَشِهِمْ خَلَا",
            "وَحُرْمَى نَصْرِ صَادَ مَرْيَمَ مَن يُرِدْ ... ثَوَابَ لَبِثْتَ الْفَرَدَ وَالْجَمْعَ وَصَلَا",
            "وَطَاسِينَ عِنْدَ الْمِيمِ فَازَ اتَّخَذْتُمُ ... أَخَذْتُمْ وَفِي الْإِفْرَادِ عَاشَرَدُ غْفَلَا",
            "وَفِي ارْكَبُ هُدًى بَر قَرِيبٍ بِخُلْفِهِمْ ... كَا ضَاعَ جَا يَلْهَثْ لَهُ دَارِ",
            "وَقَالُونُ ذُو خُلْفٍ وَفِي الْبَقَرَةِ فَقُلْ ... يُعَذِّبْ دَنَا بِالْخَلْفِ جُوداً وَمُويلا",
            "وَكُلُّهُمُ التَّنْوينَ وَالنُّونَ أَدْعَمُوا ... بِلَاغُنَةٍ فِي اللَّامِ وَالرَّالِيَجْمُلا",
            "وَكُلُّ بِيَنَمَا أَدْغَمُوا مَعَ عُةٍ ... وَفِي الْوَاوِ وَالْيَا دُونَهَا خَلَفٌ تَلَا",
           "وَعِنْدَهُمَا لِلكُلِّ أَظْهِرْ بِكِلْمَةٍ ... مَخَافَةَ إِشْبَاءِ الْمُضَاعَفِ أَثْقَلَا",
            "وَعِنْدَ حُرُوفِ الْخَلْقِ لِلْكُلِّ أُظْهَرَا ... أَلَاهَاجَ حُكُمْ ثُمَّ خَالِيهِ غُفَلَا",
            "وَقَلْبُهُما مِمَّا لَدَى الْبَا وَأُخْفِيَا ... عَلَى غُنَّةٍ عِنْدَ الْبَوَاقِي لِيَكْمُلا",
            "وَحَمْزَةٌ مِنْهُمْ وَالكِسَائِي بَعْدَهُ ... أَمَا لَا ذَوَاتِ الْيَاءِ حَيْثُ تَأَصَّلَا",
            "وَتَثْنِيَةُ الْأَسْمَاءِ تَكْشِفَهَا وَإِنْ ... رَدَدتَ إِلَيْكَ الفِعْلَ صَادَقْتَ مَنْهَلًا",
            "هَدَى وَاشْتَرَاهُ وَالْهَوَى وَهُدَاهُمُ ... وَفِي أَلِفِ التَّأْنِيثِ فِي الكُلِّ مَيْلًا",
            "وَكَيْفَ جَرَتْ فَعَلَى فَفِيهَا وُجُودُهَا ... وَإِنْ ضُمَّ أَوْ يُفْتَحْ فَعَالَى فَخَصِلَا",
            "وَفِي اسْمِ فِي الاسْتِفَهَامِ أَنَّى وَفِيمَتَى ... مَعًا وَعَسَى أَيْضًا أَمَا لَا وَقُلْ بَلَى",
            "وَمَا رَسَمُوا بِالْيَاءِ غَيْرَ لَدَى وَمَا ... زَكَى وَإِلَى مِنْ بَعْدُ حَتَّى وَقُلْ عَلَى",
            "وَكُلُّ ثلاثي يَزِيدُ فَإِنَّهُ ... عُمَالُ كَزَكَاهَا وَأَنْجِي مَعَ ابْتَلَى",
            "وَلَكِنَّ أَحْيَا عَنْهُمَا بَعْدَ وَاوِه ... وَفِيمَا سِوَاهُ لِلكِسَائِي مُيلا",
            "وَرُ يَا يَ وَالرُّءُ يَا وَمَرْضَاتِ كَيْفَمَا ... أَتَى وَخَطَايَا مِثْلُهُ مُتَقَبَّلَا",
            "وَمَحْيَاهُمُ أَيْضًا وَحَقَّ تُقَاتِهِ ... وَفِي قَدْ هَدَانِي لَيْسَ أَمْرُكَ مُشْكِلا",
                    "وَفِي الْكَهْفِ أَنْسَانِي وَمِن قَبْلُ جَاءَ مَنْ ... عَصَانِي وَأَوْصَانِي بِمَرْيَمَ يُجْتَلَى",
            "وفيها وفي طس آتَانِيَ الذِي ... أَذَعْتُ بِهِ حَتَّى تَضَوَّعَ مَنْدَلَا",
            "وَحَرْفُ تَلَاهَا مَعْ طَحَاهَا وَفِي سَجَى ... وَحَرْفُ دَحَاهَا وَهُيَ بِالْوَاوِتُبْتَلَى",
            "وَأَمَّا ضُحَاهَا وَالضُّحَى وَالرِّبَا مَعَ الـ ... قُوَى فَأَمَا لَاهَا وَبِالْوَاءِ تُخْتَلَى",
            "وَرُؤْيَاكَ مَعْ مَثْوَايَ عَنْهُ بِحَفْصِهِمْ ... وَمَحْيَايَ مِشْكَاةٍ هُدَايَ قَدِ انْجَلَى",
            "وَعَمَّا أَمَا الاهُ أَوَاخِرُ أَي مَا ... بِطهُ وَأَي النَّجْمَ كَى تَتَعَدَّلَا",
            "وَفِي الشَّمْسِ وَالْأَعْلَى وَفِي اللَّيْلِ وَالضُّحَى ... وَفِي اقْرَأْ وَفِي وَالنَّازِعَاتِ تَمَّيْلًا",
            "وَمِن تَحْتِهَا ثُمَّ الْقِيَامَةِ ثُم في الـ ... مَعَارِجِ يَا مِنْهَالُ أَفْلَحْتَ مُنْهِلا",
            "صُحْبَةٌ أَعْمَى فِي الْإِسْرَاءِ ثَانِيَا ... سُوءً وَسُدَى فِي الْوَقْفِ عَنْهُمْ تَسَبَّلَا",
            "وَرَاء  تَرَاءُ، فَازَ فِي شُعَرَائِهِ ... وَأَعْمَى فِي الإِسْرَاحُكُمُ صُحْبَةٍ أَوْلَا",
            "وَمَا بَعْدَ رَاءٍ شَاعَ حُكْمًا وَحَفْصُهُمْ ... يُوَالِى نَجْرَاهَا وَ فِي هُوَ دَ أُنْزِلَا",
            "نَأَى شُرعُ يُمَنِ بِاخْتِلَافٍ وَشَعَبَةٌ ... فِي الإِسْرَاوَهُمْ وَالنُّونَ ضَوْءُ سَنَّا تَلَا",
            "إِنَاهُ لَهُ شَافٍ وَقُلْ أَوْ كِلَاهُمَا ... شَفَا وَلِكَسْرِ أَوْلِيَاءٍ ثَلَا",
            "وَذُو الرَّاءِ وَرْضٌ بَيْنَ بَيْنَ وَفِي أَرَا ... كَهُمْ وَذَوَاتِ الْيَا لَهُ الْخُلْفُ جُمِلا",
            "وَلَكِنْ رُءُوسُ الآي قَدْ قَلَّ فَتَحْهَا ... لَهُ غَيْرَ مَا هَا فِيهِ فَاحْضُرْ مُكَمَّلا",
            "وَكَيْفَ أَتَتْ فَعْلَى وَآخِرُ أَي مَا ... تَقَدَّمَ لِلْبَصْرِى سِوَى رَاهُمَا اعْتَلَى",
            "وَيَا وَيْلَتَى أَنَّى وَيَا حَسْرَتي طَوْرًا ... وَعَنْ غَيْرِهِ فِيهَا وَيَا أَسَفَى الْعُلَى",
            "وَكَيْفَ الثَّلَاتِي غَيْرَ زَاغَتْ بِمَاضِي ... أَمِلْ خَابَ خَافُوا طَابَ ضَاقَتْ فَتُجُلا",
            "وَحَاقَ وَزَاغُوا جَاءَ شَاءَ وَزَادَ فُزْ ... وَجَاءَ ابْنُ ذَكَوَانٍ وَفِي شَاءَ مَيْلًا",
            "فَزَادَهُمُ الْأُولَى وَفِي الْغَيْرِ خُلْفُهُ ... وَقُلْ صُحْبَةٌ بَل زَانَ وَاصْحَبْ مُعَدَّلَا",
            "وَفِي أَلِفَاتٍ قَبْلَ رَا طَرَفٍ أَتَتْ ... بِكَسْرِ أَمِلْ تُدْعَى حَمِيدًا وَتُقْبَلا",
            "كَأَبْصَارِهِمْ وَالدَّارِ ثُمَّ الْحِمَارِ مَعْ ... حِمَارِكَ وَالْكُفَّارِ وَاقْتَسُ لِتَنْضُلَا",
            "وَمَعْ كَافِرِينَ الكَافِرِينَ بِيَائِهِ ... وَهَارِ رَوى مُرُو بِخُلْفٍ صَدٍ حَلَا",
            "بَدَارِ وَجَبَّارِينَ والْجَارِ تَمُوا ... وَوَرْشُ جَمِيعَ الْبَابِ كَانَ مُقَلِّلا",
            "وَهُذَانِ عَنْهُ بِاخْتِلَافٍ وَمَعَهُ الـ ... فِي بَوَارِ وَ فِي الْقَهَّارِ حَمَرَةُ قَلَلا",
            "وَإِنْجَاعُ ذِي رَائِيْنِ حَجَّ رُوَاتُهُ ... كَالأَبْرَارِ وَالتَّقْلِيلُ جَادَلَ فَيْصَلَا",
            "وَإِخْجَاعُ أَنْصَارِى تميمُ وَسَارِعُوا ... نُسَارِعُ وَالْبَارِي وَبَارِئِكُمْ ثَلَا",
            "وَأَذَانِهِمْ طُغْيَانِهِمْ وَيُسَارِعُونَ ... آذَانِنَا عَنْهُ الْجَوَارِي تَمَيَّلَا",
            "يُوَارِي أَوَارِي فِي الْعُقُودِ بِخُلْفِهِ ... بِخُلْفِ ضَمَمْنَاهُ مَشَارِبُ لَامِعُ",
            "وَفِي الْكَافِرُونَ عَابِدُونَ وَعَابِدُ ... ضِعَافًا وَحَرْفَا النَّمْلِ آتِيكَ قُولَا",
            "وَآنِيَةٍ فِي هَلْ أَتَاكَ لِأَعْدَلَا ... وَخُلْفَهُمْ فِي النَّاسِ فِي الْجَرِّ حَصِلَا",
            "حِمَارِكَ وَالْمَحْرَابِ إِكْرَاهِهِنَّ وَال ... حِمَارِ وَفِي الْإِكْرَامِ عِمرانَ مُلا",
            "وَكُلٌّ بِخُلْفٍ لِابْنِ ذَكَوَانَ غَيْرَ مَا ... يُجَرُ مِنَ الْمِحْرَابِ فَأَعْلَمُ لِتَعْمَلَا",
            "وَلَا يَمْنَعُ الْإِسْكَانُ فِي الْوَقْفِ عَارِضًا ... إِمَالَةَ مَا لِلْكَسْرِ فِي الْوَصْلِ مُيْلًا",
            "وَقَبْلَ سُكُونٍ بِمَا قِفْ فِي أُصُولِهِمْ ... وَذُو الرَّاءِ فِيهِ الْخُلْفُ فِي الوَصْلِ يُجْتَلَى",
            "كَمُوسَى الْهُدَى عِيسَى ابْنَ مَرْيَمَ وَالْقُرَى الـ ... لتى مَعَ ذِكْرَى الدَّارِ فَافْهَمْ مُحْصِلا",
            "وَقَدْ غَموا التَّنْوينَ وَقْفًا وَرَقَعُوا ... وَتَفْخِيمُهُمْ فِي النَّصْبِ أَجْمَعُ أَشْمُلَا",
            "مُسَمّى وَمَوْلًى رَفْعُهُ مَعَ جَرِه ... وَمَنْصُوبُهُ غُزّى وَتَتْراً تَزَيَّلًا",
            "وَفِي هَاءِ تَأْنِيثِ الْوُقُوفِ وَقَبْلَهَا ... مُمَالُ الكِسَائِي غَيْرَ عَشْرِ لِيَعْدِلَا",
            "وَيَجْمَعُها حَقٌ صِغَاطُ عَصِ خَظَا ... وَأَكْهَرُ بَعْدَ الْيَاءِ يَسْكُنُ مُيلا",
            "أَوِ الكَسْرِ وَالْإِسْكَانُ لَيْسَ بِحَاجِزِ ... وَيَضْعُفُ بَعْدَ الْفَتْحِ والضَّمَّ أَرْجُلًا",
            "لَعِبْرَهُ مِائَهُ وَجْهَهُ وَلَيْكَهُ ... وَبَعْضُهُمْ سِوَى أَلِفٍ عِنْدَ الكِسَائِي مَيْلًا",
            "وَرَقَّقَ وَرْشُ كُلَّ رَاءٍ وَقَبْلَهَا ... مُسَكَنَةٌ يَاءُ أَوِ الْكَسْرُ مُوصَلا",
            "وَلَمْ يَرَ فَضْلًا سَاكِنَا بَعْدَ كَسْرَةٍ ... سوى حرفِ الإِسْتِعْلَا سِوَى الْخَا فَكَمَّلا",
            "وَتَخَمَهَا فِي الْأَعْجَنِي وَفِي إِرَمَ ... وَتَكْرِيرِهَا حَتَّى يُرَى مُتَعَدِّلَا",
            "وَتَفْجِيمُهُ ذِكْرًا وَسِتْراً وَبَابَهُ ... لَدَى حِلَّةِ الْأَصْحَابِ أَعْمُرُ أَرْحُلَا",
            "وَفِي شَرَرٍ عَنْهُ يُرقِّقُ كُلُّهُمْ ... وَحَيْرَانَ بِالتَّفْجِيمِ بَعْضُ تَقَبَّلَا",
            "وَفِي الرَّاءِ عَنْ وَرْشٍ سِولى مَا ذَكَرْتُهُ ... مَذَاهِبُ شَدَّتْ فِي الْأَدَاءِ تَوَكَّلَا",
            "وَلَا بُدَّ مِنْ تَرْقِيقِهَا بَعْدَ كَسْرَةٍ ... إِذَا سَكَنَتْ يَا صَاحِ لِلسَّبْعَةِ الْمَلَا",
            "وَمَا حَرْفُ الاسْتِعْلَاءِ بَعْدُ فَرَاؤُهُ ... لِكُلِّهِمُ التَّحِيمُ فِيهَا تَذَلَّلَا",
            "وَيَجْمَعُها قِظَ خُصَّ ضَغْطٍ وَخُلْفَهُمْ ... بِفِرْقٍ جَرَى بَيْنَ الْمُشَايِخِ سَلْسَلَا",
            "وَمَا بَعْدَ كَسْرِ عَارِضٍ أَوْ مُفَصَلٍ ... فَفَجِّمْ فَهَذَا حُكْمُهُ مُتَبَدِّلَا",
            "وَمَا بَعْدَهُ كَسْرُ أَوِ الْيَا فَمَا لَهُمْ ... بِتَرْقِيقِهِ نَصُ وَثِيقٌ فَيَمُثُلا",
            "وَمَا لِقِيَاسِ فِي الْقِرَاءَةِ مَدَخَلُ ... فَدُونَكَ مَا فِيهِ الرِّضَا مُتَكَفِّلَا",
            "وَتَرْقِيقُهَا مَكْسُورَةٌ عِنْدَ وَصْلِهِمْ ... وَتَفْجِيمُهَا فِي الْوَقْفِ أَجْمَعُ أَشْمُلا",
            "وَلَكِنَّهَا فِي وَقُفِهِمْ مَعَ غَيْرِهَا ... تُرَقَّقُ بَعْدَ الْكَسْرِ أَوْ مَا تَمَيَّلَا",
            "أَوِ الْيَاءِ تَأْتِي بِالسُّكُونِ وَرَوْمُهُمْ ... كَمَا وَصْلِهِمْ فَابْلُ الزَّكَاةَ مُصَقَلَا",
            "وَفِيمَا عَدَا هَذَا الَّذِي قَدْ وَصَفْتُهُ ... عَلَى الْأَصْلِ بِالتَّفْظِيمِ كُنْ مُتَعَمِّلًا",
            "وَغَلَّظَ وَرْشُ فَتْحَ لَام لِصَادِهَا ... أَوِ الطَّاءِ أَوْ لِلظَّاءِ قَبْلُ تَنَزُلَا",
            "إِذَا فُتِحَتْ أَوْ سُكِّنَتْ كَصَلَاتِهِمْ ... وَمَطْلَعِ أَيْضًا ثُمَّ ظَلَّ وَيُوصَلا",
            "وَفِي طَالَ خُلْفٌ مَعْ فِصَالاً وَعِنْدَمَا ... يُسَكَنُ وَقْفًا وَالْفَخَّمُ فَضْلًا",
            "وَحُكُمُ ذَواتِ الْيَاءِ مِنْهَا كَهْذِهِ ... وَعِنْدَ رُوسِ الْآتِ تَرْقِيقُهَا اعْتَلَى",
            "وَكُلُّ لَدَى اسْمِ اللَّهِ مِنْ بَعْدِ كَسْرَةٍ ... يُرقِّقُهَا حَتَّى يَرُوقَ مُرَتِّلَا",
            "كَمَا فَخَتَمُوهُ بَعْدَ فَتْحِ وَضَمَّةٍ ... فَتَمَّ نِظَامُ الشَّمْلِ وَصْلًا وَفَيْصَلَا",
            "وَالإِسْكَانُ أَصْلُ الْوَقْفِ وَهُوَ اشْتِقَاقُهُ ... مِنَ الْوَقْفِ عَنْ تَحْرِيكِ حَرْفٍ تَعَزَّلَا",
            "وَعِنْدَ أَبِي عَمْرُو وَكُوفِيهِمْ بِهِ ... مِنَ الرَّوْمِ وَالْإِسْمَامِ سَمْتُ تَحَمَلَا",
            "وَأَكْثَرُ أَعْلَامِ الْقُرَانِ يَرَاهُما ... لِسَائِرِهِمْ أَوْلَى الْعَلَائِقِ مِطْوَلَا",
            "وَرَوْمُكَ إِسْمَاعُ الْمُحَرَّكِ وَاقِفا ... بِصُوتٍ خَفِي كُلَّ دَانٍ تَنَوَّلَا",
            "وَالإِشْمَامُ إِطْبَاقُ الشِّفَاءِ بُعَيْدَ مَا ... يُسَكَنُ لَا صَوتُ هُنَاكَ فَيَصْحَلَا",
            "وَفِعِلُهُمَا فِي الصَّمِ وَالرَّفْعِ وَارِدُ ... وَرَوْمُكَ عِندَ الْكَسْرِ وَالْجَرِ وَصِلَا",
            "وَلَمْ يَرَهُ فِي الْفَتْحِ وَالنَّصْبِ قَارِئُ ... وَعِنْدَ إِمَامِ التَّحْوِ فِي الْكُلِّ أُعْمِلا",
            "وَمَا نُوعَ التَّحْرِيكُ إِلَّا لِلَّازِمِ ... بِنَاءً وَإِعْرَابِ غَدًا مُتَنَقِلا",
            "وَفِي هَاءِ تَأْنِيثِ وَمِيمِ الجَميعِ قُدْ ... وَعَارِضِ شَكُل لَمْ تَكُونَا لِيَدْخُلَا",
            "وَفِي الْمَاءِ لِلْإِضْمَارِ قَوْمُ أَبُوهُمَا ... وَمِنْ قَبْلِهِ ضَمَّ أَوِ الكَسْرُ مُثْلَا",
            "أَوْ مَا هُمَا وَاوْ وَيَاءٌ وَبَعْضُهُمْ ... يَرَى لَهُمَا فِي كُلِّ حَالٍ مُحَلِّلا",
            "وَكُوفِيُّهُمْ وَالْمَازِنِي وَنَافِعُ ... عُنُوا بِاتِّبَاعِ الْخَطِ فِي وَقُفِ الإِبْتِلَا",
            "وَلِابْنِ كَثِيرٍ يُرْتَضَى وَابْنِ عَامِرٍ ... وَمَا اخْتَلَفُوا فِيهِ حَرِ أَنْ يُفَصَّلَا",
            "إِذَا كُتِبَتْ بِالتَّاءِ هَاءُ مُونَتْ ... فَبِالْهَاءِ قِفْ حَقًّا رِضَى وَمُعَوِلَا",
            "وَفِي اللَّاتَ مَعْ مَرْضَاتِ مَعْ ذَاتَ بَهْجَةٍ ... وَلَاتَ رِضَى هَيْهَاتَ هَادِيهِ رُفْلًا",
            "وَقِفْ يَا أَبَهُ كُفْؤَادَنَا وَكَأَيِّنِ الـ ... وُقُوفُ بِنُونٍ وَهُوَ بِالْيَاءِ حَصِلَا",
            "وَمَالِ لَدَى الْفُرْقَانِ وَالْكَهْفِ وَالنِّسَا ... وَسَالَ عَلَى مَا حَجَّ وَالْخُلْفُ رُتِّلَا",
            "وَيَا أَيُّهَا فَوْقَ الدُّخَانِ وَأَيُّهَا ... لَدَى النُّورِ وَالرَّحْمَنِ رَا فَقْنَ حُمَّلا",
            "وَفِي الْمَا عَلَى الْإِبْبَاعِ ضَمَّ ابْنُ عَامِرٍ ... لَدَى الْوَصْلِ وَالْرَّسُومُ فِيهِنَّ أَخْيَلَا",
            "وَقِفْ وَتَكَأَنَّهُ وَنَكَأَنَّ بِرَسْمِهِ ... وَبِالْيَاءِ قِفْ رُفَقًا وَبِالْكَافِ حُلِّلَا",
            "وَأَيَّا بِأَيَّا مَا شَفَا وَسِوَاهُمَا ... بِمَا وَبِوَادِي النَّمْلِ بِالْيَا سَنَّا تَلَا",
            "وفَيَمَهُ قِفْ وَعَمَّهُ لِمَهُ بِمَهُ ... بِخُلْفٍ عَنِ الْبِرِّيِّ وَادْفَعْ مُجَهلا",
            "وَلَيْسَتْ بِلَامِ الْفِعْلِ يَاءُ إِضَافَةِ ... وَمَا هِيَ مِنْ نَفْسِ الْأُصُولِ فَتُسْكِلَا",
            "وَلَكِنَّهَا كَالْهَاءِ وَالْكَافِ كُلُّ مَا ... تَلِيهِ يُرَى لِلْهَاءِ وَالْكَافِ مَدْخَلَا",
            "وَفِي مِائَتَيْ يَاءٍ وَعَشْرٍ مُبِيفَةٍ ... وَتَنْتَيْنِ خُلْفُ الْقَوْمِ أَحْكِيهِ مُجْمَلَا",
            "فَتِسْعُونَ مَنْ هَمْزِ بِفَتْحِ وَتِسْعُهَا ... سَمَا فَتَحْهَا إِلَّا مَوَاضِعَ هُمَلَا",
            "فَأَرْنِي وَتَفْتِنِي اتَّبِعْنِي سُكُونُهَا ... لِكُلِّ وَتَرْحَمْنِي أَكُنْ وَلَقَدْ جَلَا",
            "ذَرُونِي وَادْعُونِي أَذْكُرُونِي فَتَحْهَا ... دَواءٌ وَأَوْزِعْنِي مَعا جَادَ هُطَلَا",
            "لِيَبْلُوَنِي مَعْهُ سَبِيلِي لِنَافِعِ ... وَعَنْهُ وَلِلْبَصْرِي ثَمَانٍ تُنْخِلًا",
            "بِيُوسُفَ إِنِّي الْأَوْلَانِ وَلِي بِهَا ... وَضَيْفِي وَلَسَرْ لِي وَدُونِي تَمَثَّلَا",
            "وَيَاءَانِ فِي اجْعَل لِي وَأَرْبَعُ إِذْ حَمَتْ ... هُدَاهَا وَلَكِنِّي بِهَا اثْنَانِ وُكِلَا",
            "وَتَحْتَى وَقُلْ فِي هُودَ إِنِّي أَرَاكُمْ ... وَقُلْ فَطَرَنَ فِي هُوَدَهَا دِيهِ أَوْ صَلَا",
            "وَيَحْزُنى حرمِيتُهُمْ تَعِدَانِي ... حَشَرْتَنِي اعْلَى تَأْمُرُونِي وَصَلَا",
            "أَرَهْطِي سَمَا مُولَى وَمَا لِي سَمَا لِوى ... لَعَلَى سَمَا كُفُوًا مَعِي نَفَرَ الْعُلَى",
            "عَادٌ وَ تَحْتَ النَّمْلِ عِنْدِي حَسْنُهُ ... إِلَى ذُرِّهِ بِالْخُلْفِ وَافَقَ مُوهَلَا",
            "وَتَنْتَانِ مَعْ خَمْسِينَ مَعْ كَسْرِ هَمْزَةٍ ... بِفَتْحِ أُولِى حُكْم سوى مَا تَعَزَّلَا",
        ];

        // ฟังก์ชันลบสระภาษาอาหรับ (Harakat) เพื่อให้ค้นหาง่ายขึ้น
        function normalizeArabic(text) {
            return text
                .replace(/[\u0617-\u061A\u064B-\u0652\u0670]/g, "") 
                .replace(/[أإآ]/g, "ا") 
                .replace(/ة/g, "ه"); 
        }

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        // ทำงานทันทีเมื่อมีการพิมพ์ (Real-time search)
        searchInput.addEventListener('input', function() {
            const query = normalizeArabic(this.value.trim());
            resultsDiv.innerHTML = ''; 

            if (query === '') {
                resultsDiv.innerHTML = '<div class="empty-state">ابحث عن أي كلمة لظهور الأبيات...</div>';
                return;
            }

            const filteredVerses = shatibiyyahVerses.map((verse, index) => {
                return { 
                    original: verse, 
                    index: index + 1, 
                    normalized: normalizeArabic(verse) 
                };
            }).filter(item => item.normalized.includes(query));

            if (filteredVerses.length === 0) {
                resultsDiv.innerHTML = '<div class="empty-state">لا توجد نتائج مطابقة... (ไม่พบคำที่ค้นหา)</div>';
            } else {
                filteredVerses.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `${item.original} <span class="verse-number">[بيت: ${item.index}]</span>`;
                    resultsDiv.appendChild(div);
                });
            }
        });
    </script>
</body>
</html>
